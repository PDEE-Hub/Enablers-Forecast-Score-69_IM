  };

  };
  for(let L=1;L<=5;L++){
    cmState[s.id].minReqChecked[L]=(s.minReqs[L]||[]).map(()=>false);

function smCalcLevel(id,L){
  const s=DATA.sm.subs.find(x=>x.id===id);
  const st=smState[id];
  // Check all min reqs for this level
  const mrs=s.minReqs[L]||[];
  const allMR=mrs.every((_,i)=>st.minReqChecked[L][i]);
  if(!allMR) return 0;
  // Dim multiplier
  if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
    const checked=st.subCompChecked[L].filter(Boolean).length;
    return checked/s.subComps[L].length;
  }
  return st.dimMult[L]||0;
}
function smCalcRaw(id){
  let total=0;
  for(let L=1;L<=5;L++){
    const lScore=smCalcLevel(id,L);
    total+=lScore;
    if(lScore===0) break; // sequential gating
  }
  return total;
}
function smUpdateTarget(id){
  const raw=smCalcRaw(id);
  targets.sm[id]=raw;
}

function subs(){return DATA[curDim].subs;}
function orig(){return DATA[curDim].orig;}
function sClass(st){return st==='เสร็จแล้ว'?'s2':st==='กำลังดำเนินการ'?'s1':'s0';}
function sIcon(st){return st==='เสร็จแล้ว'?'✓':st==='กำลังดำเนินการ'?'●':'○';}
function fmt(n){return n.toFixed(4);}
function calcGroupScore(gid){const ss=subs().filter(s=>s.grp===gid);return ss.reduce((a,s)=>a+s.w*targets[curDim][s.id],0)/ss[0].gw;}
function calcTotal(){
  const tw=subs().reduce((a,s)=>a+s.w,0);
  if(curDim==='sm'){
    return subs().reduce((a,s)=>{
      const raw=smCalcRaw(s.id);
      return a+s.w/tw*raw;
    },0);
  }
  if(curDim==='cm'){
    return subs().reduce((a,s)=>{
      const raw=cmCalcRaw(s.id);
      return a+s.w/tw*raw;
    },0);
  }
  return subs().reduce((a,s)=>a+s.w/tw*targets[curDim][s.id],0);
}
function dotColor(id){
  const s=subs().find(x=>x.id===id);
  const t=curDim==='sm'?smCalcRaw(id):curDim==='cm'?cmCalcRaw(id):targets[curDim][id];
  const diff=t-s.s68;
  if(diff<0.01)return 'dg';if(diff<0.5)return 'da';return 'dr';
}

  const grps=[...new Set(subs().map(s=>s.grp))];
  grps.forEach(gid=>{
    const gs=calcGroupScore(gid);const diff=gs-subs().filter(s=>s.grp===gid)[0].gs68;
    const el=document.getElementById('gs-'+curDim+'-'+gid);
    if(el){el.textContent=fmt(gs);el.className='chip '+(diff<-0.001?'cr':diff>0.001?'ct':'cn');}
  });
  subs().forEach(s=>{const d=document.getElementById('dot-'+s.id);if(d)d.className='dot '+dotColor(s.id);});
  // Refresh SM left panel score displays
  if(curDim==='sm'){
    DATA.sm.subs.forEach(s=>{
      smUpdateTarget(s.id);
      const el=document.getElementById('sm-tgt-'+s.id);
      if(el) el.textContent=fmt(targets.sm[s.id]);
      const dot=document.getElementById('dot-'+s.id);
      if(dot) dot.className='dot '+dotColor(s.id);
    });
  }
  if(curDim==='cm'){
    DATA.cm.subs.forEach(s=>{
      cmUpdateTarget(s.id);
      const inp=document.getElementById('ti-'+s.id);
      if(inp) inp.value=fmt(cmCalcRaw(s.id));
      const dot=document.getElementById('dot-'+s.id);
      if(dot) dot.className='dot '+dotColor(s.id);
      cmColorSubTarget(s.id);
    });
  }
  const total=calcTotal();const delta=total-orig();
  document.getElementById('totalChip').textContent='คาดการณ์ '+fmt(total);
  document.getElementById('totalChip').className='chip '+(delta>0?'ct':delta<0?'cr':'cn');
  document.getElementById('totalFooter').textContent=fmt(total);
  document.getElementById('totalFooter').className='chip '+(delta>0?'ct':delta<0?'cr':'cn');
  document.getElementById('deltaChip').textContent=(delta>=0?'+':'')+fmt(delta)+' pts';
  document.getElementById('deltaChip').style.color=delta>0?'#1a9a50':delta<0?'#c03020':'#888';
  document.getElementById('deltaFooter').textContent=(delta>=0?'+':'')+fmt(delta);
  document.getElementById('deltaFooter').style.color=delta>0?'#5fcf8a':delta<0?'#f0806a':'#888';
}


function renderSMSimulator(s){
  const id=s.id;
  const state=smState[id];
  // Calculate scores per level with gating
  const lvlScores=[]; let stopped=false;
  for(let L=1;L<=5;L++){
    if(stopped){lvlScores.push({score:0,blocked:true,passedMR:false,mult:0});continue;}
    const mrs=s.minReqs[L]||[];
    const passedMR=mrs.length===0||mrs.every((_,i)=>state.minReqChecked[L][i]);
    let mult=0;
    if(passedMR){
      if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
        const checked=state.subCompChecked[L].filter(Boolean).length;
        mult=checked/s.subComps[L].length;
      } else { mult=state.dimMult[L]||0; }
    }
    const score=passedMR?mult:0;
    lvlScores.push({score,blocked:false,passedMR,mult});
    if(score===0) stopped=true;
  }
  const rawTotal=lvlScores.reduce((a,x)=>a+x.score,0);
  const wtScore=rawTotal*(s.w/100);

  // Render each level
  const levelDimLabels=s.dimLevels||[];
  // Map: if dimLevels has 5 items → L1-L5; if 4 items, first covers L1-L2
  function getDimLabel(L){
    if(levelDimLabels.length>=5) return levelDimLabels[L-1]||'';
    if(levelDimLabels.length===4){
      if(L<=2) return levelDimLabels[0]||'';
      return levelDimLabels[L-2]||'';
    }
    return levelDimLabels[L-1]||'';
  }

  let lvlHTML='';
  lvlScores.forEach((ls,i)=>{
    const L=i+1;
    const dl=getDimLabel(L);
    const mrs=s.minReqs[L]||[];
    const hasSub=s.subComps&&s.subComps[L]&&s.subComps[L].length>0;
    const subs=hasSub?s.subComps[L]:[];
    const passTag=ls.blocked?`<span class="sm-lvl-pass sm-skip">ล็อค</span>`:ls.passedMR?`<span class="sm-lvl-pass sm-pass">ผ่าน</span>`:`<span class="sm-lvl-pass sm-fail">ไม่ผ่าน</span>`;
    const scoreTag=`<span style="font-size:11px;font-weight:700;color:${ls.score>0?'#1a7a4a':'#c03020'};">${ls.score.toFixed(4)}</span>`;

    // Min Req checkboxes
    let mrHTML='';
    if(mrs.length>0){
      mrHTML=`<div class="sm-sect-lbl">🔒 Minimum Requirement (L${L})</div>`;
      mrs.forEach((txt,ri)=>{
        const chk=state.minReqChecked[L][ri]?'checked':'';
        mrHTML+=`<div class="sm-req-item"><input type="checkbox" id="mr-${id}-${L}-${ri}" ${chk} onchange="smToggleMR('${id}',${L},${ri},this.checked)"><label for="mr-${id}-${L}-${ri}">${txt}</label></div>`;
      });
    }

    // Dim multiplier
    let dimHTML=`<div class="sm-sect-lbl">📐 มิติที่ประเมิน (Dimension Multiplier)</div>`;
    if(dl) dimHTML+=`<div style="font-size:10px;color:#555;margin-bottom:5px;line-height:1.4;">${dl}</div>`;
    if(hasSub){
      dimHTML+=`<div class="sm-frac-items">`;
      subs.forEach((txt,si)=>{
        const chk=(state.subCompChecked[L]||[])[si]?'checked':'';
        const fc=subs.length>0?(state.subCompChecked[L]||[]).filter(Boolean).length:0;
        dimHTML+=`<div class="sm-req-item"><input type="checkbox" id="sc-${id}-${L}-${si}" ${chk} onchange="smToggleSC('${id}',${L},${si},this.checked)"><label for="sc-${id}-${L}-${si}">${txt}</label></div>`;
      });
      const fc=(state.subCompChecked[L]||[]).filter(Boolean).length;
      dimHTML+=`</div><div style="font-size:10px;color:#555;margin-top:3px;">✓ ${fc}/${subs.length} = <strong>${(subs.length?fc/subs.length:0).toFixed(4)}</strong></div>`;
    } else {
      const cv=state.dimMult[L]||0;
      dimHTML+=`<div class="sm-radio-grp">`;
      [[0,'0 — ไม่ผ่าน'],[0.5,'0.5 — บางส่วน'],[1,'1.0 — สมบูรณ์']].forEach(([v,lbl])=>{
        const chk=cv===v?'checked':'';
        dimHTML+=`<label><input type="radio" name="dim-${id}-${L}" value="${v}" ${chk} onchange="smSetDim('${id}',${L},${v})"> ${lbl}</label>`;
      });
      dimHTML+=`</div>`;
    }

    lvlHTML+=`<div class="sm-lvl-row${ls.blocked?' blocked':''}">
      <div class="sm-lvl-hd">
        <span class="sm-lvl-num">L${L}</span>
        <span class="sm-lvl-desc" style="font-size:9px;">${dl.substring(0,80)}${dl.length>80?'…':''}</span>
        <span style="display:flex;gap:4px;align-items:center;">${passTag}${scoreTag}</span>
      </div>
      <div class="sm-lvl-body">${mrHTML}${dimHTML}</div>
    </div>`;
  });

  return `<div class="sm-sim">
    <div class="sm-sim-hd"><span style="font-size:11px;padding:2px 8px;border-radius:6px;background:#8a5010;color:#fff;">Sim</span>Target Score Simulator — Sequential Gating</div>
    <div class="sm-scope-box">${s.scopeNote||''}</div>
    ${lvlHTML}
    <div class="sm-total-bar">
      <span class="sm-total-lbl">คะแนนดิบสะสม (0–5)</span>
      <span class="sm-raw">${rawTotal.toFixed(4)}</span>
      <span class="sm-wt">× ${s.w}% = <strong>${wtScore.toFixed(4)} pts</strong></span>
    </div>
  </div>`;
}

function smToggleMR(id,L,ri,val){
  smState[id].minReqChecked[L][ri]=val;
  smUpdateTarget(id);
  if(curDim==='sm'&&focusId===id) renderAll(); else updateScores();
}
function smToggleSC(id,L,si,val){
  if(!smState[id].subCompChecked[L]) smState[id].subCompChecked[L]=[];
  smState[id].subCompChecked[L][si]=val;
  smUpdateTarget(id);
  if(curDim==='sm'&&focusId===id) renderAll(); else updateScores();
}
function smSetDim(id,L,val){
  smState[id].dimMult[L]=parseFloat(val);

}


// ── CM Simulator Functions ──────────────────────────────────────────────────
function cmCalcLevel(id,L){
  const st=cmState[id];
  const s=DATA.cm.subs.find(x=>x.id===id);
  const mrs=s.minReqs[L]||[];
  const passedMR=mrs.length===0||mrs.every((_,i)=>st.minReqChecked[L][i]);
  if(!passedMR) return 0;
  if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
    const checked=(st.subCompChecked[L]||[]).filter(Boolean).length;
    return checked/s.subComps[L].length;
  }
  return st.dimMult[L]||0;
}
function cmCalcRaw(id){
  let raw=0; let stopped=false;
  for(let L=1;L<=5;L++){
    if(stopped){continue;}
    const lScore=cmCalcLevel(id,L);
    raw+=lScore;
    if(lScore===0) stopped=true;
  }
  return raw;
}
function cmUpdateTarget(id){targets.cm[id]=cmCalcRaw(id)||DATA.cm.subs.find(x=>x.id===id).s68;}
function cmToggleMR(id,L,ri,val){
  cmState[id].minReqChecked[L][ri]=val;
  cmUpdateTarget(id);
  if(curDim==='cm'&&focusId===id) renderAll(); else updateScores();
}
function cmToggleSC(id,L,si,val){
  if(!cmState[id].subCompChecked[L]) cmState[id].subCompChecked[L]=[];
  cmState[id].subCompChecked[L][si]=val;
  cmUpdateTarget(id);
  if(curDim==='cm'&&focusId===id) renderAll(); else updateScores();
}
function cmSetDim(id,L,val){
  cmState[id].dimMult[L]=parseFloat(val);
  cmUpdateTarget(id);
  if(curDim==='cm'&&focusId===id) renderAll(); else updateScores();
}

// ── CM sub-target score box coloring ──────────────────────────────────────────
function cmColorSubTarget(id){
  const raw=cmCalcRaw(id);
  const stDiv=document.getElementById('st-'+id);
  const inp=document.getElementById('ti-'+id);
  const dot=document.getElementById('dot-'+id);
  if(!stDiv||!inp) return;
  // Hide dot for CM — background color conveys status already
  if(dot) dot.style.display='none';
  // Score gradient: 0-2=red, 2-3=red-mid, 3-4=yellow, 4-5=green, 5=deep green
  let bg, color;
  if(raw >= 5.0)      { bg='#1B7B50'; color='#fff'; }
  else if(raw >= 4.0) { bg='#51BF8E'; color='#0D3D26'; }
  else if(raw >= 3.0) { bg='#F8BD21'; color='#4A3200'; }
  else if(raw >= 2.0) { bg='#FF6766'; color='#fff'; }
  else if(raw >  0)   { bg='#FFACAB'; color='#7A1010'; }
  else                { bg=''; color=''; }
  stDiv.style.background=bg;
  stDiv.style.borderLeftColor=bg||'#d4d0c8';
  inp.style.background='transparent';
  inp.style.border=bg?'none':'';
  inp.style.color=color||'#1E293B';
  inp.style.fontWeight=bg?'700':'';
}

function toggleLvlDetail(id,L){
  const panel=document.getElementById('lvld-'+id+'-'+L);
  const btn=document.getElementById('lvlbtn-'+id+'-'+L);
  if(!panel||!btn) return;
  const open=panel.classList.toggle('open');
  btn.classList.toggle('open',open);
  btn.textContent=open?'▲':'▼';
}

// ── Extract short Key Takeaway from dimLevel string ──────────────────────────
// Pattern: "Level N (KEY TAKEAWAY): full description..."
function extractKeyTakeaway(dl){
  const m=dl.match(/\(([^)]+)\)/);
  return m?m[1]:dl.substring(0,30);
}

function renderCMSimulator(s){
  const id=s.id;
  const state=cmState[id];
  const lvlScores=[]; let stopped=false;
  for(let L=1;L<=5;L++){
    if(stopped){lvlScores.push({score:0,blocked:true,passedMR:false,mult:0});continue;}
    const mrs=s.minReqs[L]||[];
    const passedMR=mrs.length===0||mrs.every((_,i)=>state.minReqChecked[L][i]);
    let mult=0;
    if(passedMR){
      if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
        const checked=(state.subCompChecked[L]||[]).filter(Boolean).length;
        mult=checked/s.subComps[L].length;
      } else { mult=state.dimMult[L]||0; }
    }
    const score=passedMR?mult:0;
    lvlScores.push({score,blocked:false,passedMR,mult});
    if(score===0) stopped=true;
  }
  const rawTotal=lvlScores.reduce((a,x)=>a+x.score,0);
  const wtScore=rawTotal*(s.w/50); // CM total weight = 50%

  // Cross-link lookup: {level -> [dim, dim, ...]}
  const linkMap={};
  (s.links||[]).forEach(l=>{
    if(!linkMap[l.level]) linkMap[l.level]=[];
    linkMap[l.level].push(l.dim);
  });

  let lvlHTML='';
  lvlScores.forEach((ls,i)=>{
    const L=i+1;
    const dl=s.dimLevels[L-1]||'';    const mrs=s.minReqs[L]||[];
    const hasSub=s.subComps&&s.subComps[L]&&s.subComps[L].length>0;
    const subList=hasSub?s.subComps[L]:[];
    // ── CM Level status color system (0=red, 0.5=yellow, 1.0=green, blocked=gray) ──
    const lvlBg = ls.blocked ? '#b0bec5'
      : ls.score >= 1.0 ? '#51BF8E'
      : ls.score > 0    ? '#F8BD21'
      :                   '#FF6766';
    const lvlColor = ls.blocked ? '#546e7a'
      : ls.score >= 1.0 ? '#0D3D26'
      : ls.score > 0    ? '#4A3200'
      :                   '#fff';
    const hdBg = ls.blocked ? '#f4f0e8'
      : ls.score >= 1.0 ? '#e6f8f1'
      : ls.score > 0    ? '#fef9e7'
      :                   '#fff0ee';
    const passTag = ls.blocked
      ? '<span class="sm-lvl-pass sm-skip">ล็อค</span>'
      : ls.score >= 1.0
        ? '<span class="sm-lvl-pass" style="background:#51BF8E;color:#0D3D26;font-weight:700;">✓ ผ่าน</span>'
        : ls.score > 0
          ? '<span class="sm-lvl-pass" style="background:#F8BD21;color:#4A3200;font-weight:700;">◐ บางส่วน</span>'
          : '<span class="sm-lvl-pass" style="background:#FF6766;color:#fff;font-weight:700;">✗ ไม่ผ่าน</span>';
    const scoreColor = ls.blocked ? '#9ca3af'
      : ls.score >= 1.0 ? '#0D3D26'
      : ls.score > 0    ? '#4A3200'
      :                   '#c0392b';
    const scoreTag=`<span style="font-size:11px;font-weight:700;color:${scoreColor};">${ls.score.toFixed(4)}</span>`;
    // Cross-link icon for this level
    const lvlLinks=linkMap[L]||[];
    const linkIcon=lvlLinks.length>0?`<a href="https://pdee-hub.github.io/Enablers-Link-Document-69/" target="_blank" class="cm-link-icon">🔗 ${lvlLinks.join(' · ')}</a>`:'';
    let mrHTML='';
    if(mrs.length>0){
      mrHTML=`<div class="sm-sect-lbl">🔒 Minimum Requirement (L${L})</div>`;
      mrs.forEach((txt,ri)=>{
        const chk=state.minReqChecked[L][ri]?'checked':'';
        mrHTML+=`<div class="sm-req-item"><input type="checkbox" id="cm-mr-${id}-${L}-${ri}" ${chk} onchange="cmToggleMR('${id}',${L},${ri},this.checked)"><label for="cm-mr-${id}-${L}-${ri}">${txt}</label></div>`;
      });
    }
    let dimHTML=`<div class="sm-sect-lbl">📐 มิติที่ประเมิน (Dimension Multiplier)</div>`;
    if(dl) dimHTML+=`<div style="font-size:10px;color:#555;margin-bottom:5px;line-height:1.4;">${dl}</div>`;
    if(hasSub){
      dimHTML+='<div class="sm-frac-items">';
      subList.forEach((txt,si)=>{
        const chk=(state.subCompChecked[L]||[])[si]?'checked':'';
        dimHTML+=`<div class="sm-req-item"><input type="checkbox" id="cm-sc-${id}-${L}-${si}" ${chk} onchange="cmToggleSC('${id}',${L},${si},this.checked)"><label for="cm-sc-${id}-${L}-${si}">${txt}</label></div>`;
      });
      const fc=(state.subCompChecked[L]||[]).filter(Boolean).length;
      dimHTML+=`</div><div style="font-size:10px;color:#555;margin-top:3px;">✓ ${fc}/${subList.length} = <strong>${(subList.length?fc/subList.length:0).toFixed(4)}</strong></div>`;
    } else {
      const cv=state.dimMult[L]||0;
      dimHTML+='<div class="sm-radio-grp">';
      [[0,'0 — ไม่ผ่าน'],[0.5,'0.5 — บางส่วน'],[1,'1.0 — สมบูรณ์']].forEach(([v,lbl])=>{
        const chk=cv===v?'checked':'';
        dimHTML+=`<label><input type="radio" name="cm-dim-${id}-${L}" value="${v}" ${chk} onchange="cmSetDim('${id}',${L},${v})"> ${lbl}</label>`;
      });
      dimHTML+='</div>';
    }
    const kt=extractKeyTakeaway(dl);
    lvlHTML+=`<div class="sm-lvl-row${ls.blocked?' blocked':''}">      <div class="sm-lvl-hd" style="background:${hdBg};">        <span class="sm-lvl-num" style="background:${lvlBg};color:${lvlColor};">L${L}</span>        <span class="sm-lvl-desc"><span class="lvl-kt">(${kt})</span>${dl?`<button class="lvl-toggle" id="lvlbtn-${id}-${L}" onclick="event.stopPropagation();toggleLvlDetail('${id}',${L})">▼</button>`:''}        </span>        <span style="display:flex;gap:4px;align-items:center;">${linkIcon}${passTag}${scoreTag}</span>      </div>      ${dl?`<div class="sm-lvl-detail" id="lvld-${id}-${L}">${dl}</div>`:''}      <div class="sm-lvl-body">${mrHTML}${dimHTML}</div>    </div>`;
  });
  return `<div class="sm-sim">    <div class="sm-sim-hd"><span style="font-size:11px;padding:2px 8px;border-radius:6px;background:#0a8a7a;color:#fff;">Sim</span>Target Score Simulator — Sequential Gating</div>    <div class="sm-scope-box">${s.scopeNote||''}</div>    ${lvlHTML}    <div class="sm-total-bar">      <span class="sm-total-lbl">คะแนนดิบสะสม (0–5)</span>      <span class="sm-raw">${rawTotal.toFixed(4)}</span>      <span class="sm-wt">× ${s.w}% (CM 50%) = <strong>${wtScore.toFixed(4)} pts</strong></span>    </div>  </div>`;
}

function toggleCL(subId,i,val){
  if(!clChecked[subId]) clChecked[subId]=[];
  clChecked[subId][i]=val;
  const row=document.getElementById('clrow-'+subId+'-'+i);
  if(!row) return;
  if(val){
    row.style.background='#E6F8F1';
    row.style.borderLeft='3px solid #51BF8E';
    row.style.borderRadius='5px';
  } else {
    row.style.background='#FFF0EE';
    row.style.borderLeft='3px solid #FF6766';
    row.style.borderRadius='5px';
  }
}

function renderChecklist(){
  if(!focusId){document.getElementById('clTitle').textContent='เลือก sub-item เพื่อดู Action Checklist';document.getElementById('clItems').innerHTML='';return;}
  const s=subs().find(x=>x.id===focusId);if(!s)return;
  document.getElementById('clTitle').textContent=`Action Checklist — ข้อ ${s.id} · เป้า ${fmt(curDim==='sm'?smCalcRaw(s.id):curDim==='cm'?cmCalcRaw(s.id):targets[curDim][s.id])}`;
  if(!clChecked[s.id]) clChecked[s.id]=s.actions.map(()=>false);
  document.getElementById('clItems').innerHTML=s.actions.map((a,i)=>{
    const chk=clChecked[s.id][i];
    const style=chk
      ?'background:#E6F8F1;border-left:3px solid #51BF8E;border-radius:5px;padding:4px 8px;margin-bottom:4px;'
      :'background:#FFF0EE;border-left:3px solid #FF6766;border-radius:5px;padding:4px 8px;margin-bottom:4px;';
    return `<div class="cl-item" id="clrow-${s.id}-${i}" style="${style}"><input type="checkbox" id="cl-${s.id}-${i}" ${chk?'checked':''} onchange="toggleCL('${s.id}',${i},this.checked)"><label for="cl-${s.id}-${i}">${a}</label></div>`;
  }).join('');
}

function renderAll(){renderLeft();renderRight();renderChecklist();updateScores();}
renderAll();


renderAll();
</script>
