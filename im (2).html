var D={"1.1":{scopeNote:"มุ่งเน้นประเมินความมุ่งมั่นของผู้บริหารระดับสูงในการ \"นำทิศทาง (Direct)\", \"เป็นแบบอย่าง (Role Model)\", \"กำหนดและกระจายเป้าหมาย (Cascade KPI)\", \"บูรณาการยุทธศาสตร์ (Align)\", และ \"ติดตามปรับปรุง (Monitor & Improve)\" ด้านการจัดการนวัตกรรมขององค์กรอย่างเป็นระบบ",dimLevels:["กำหนดและสื่อสารวิสัยทัศน์ ทิศทาง นโยบาย และเป้าหมายนวัตกรรม ให้บุคลากรภายในและผู้มีส่วนได้ส่วนเสียภายนอกรับรู้","ผู้บริหารระดับสูงปฏิบัติตนเป็นต้นแบบ (Role Model) และมีส่วนร่วมในการส่งเสริม สร้างแรงจูงใจ ให้เกิดการใช้นวัตกรรมอย่างชัดเจนเป็นรูปธรรม","กำหนดตัวชี้วัด (KPI) และเป้าหมาย \"ด้านการเงิน\" และ \"ไม่ใช่การเงิน\" และถ่ายทอดลงสู่ระดับองค์กร -> สายงาน -> บุคคล","เชื่อมโยงการจัดการนวัตกรรมกับยุทธศาสตร์ขององค์กร และแผนงานที่สำคัญอื่นๆ (เช่น แผนลูกค้า SCM, แผน KM, แผนเทคโนโลยีดิจิทัล DT, แผน HCM)","ผู้บริหารติดตาม ดูแล และสนับสนุนอย่างสม่ำเสมอ และ \"ใช้ข้อมูลป้อนกลับ (Feedback)\" หรือข้อมูลจากแหล่งอื่น เพื่อนำมาปรับปรุงทิศทาง นโยบาย หรือเป้าหมายด้านนวัตกรรม"],minReqs:{1:["ประกาศนโยบาย/วิสัยทัศน์ด้านการส่งเสริมความคิดสร้างสรรค์และนวัตกรรม (ลงนามโดยผู้บริหารสูงสุด)","แผนการสื่อสารและหลักฐานการสื่อสาร \"ภายในองค์กร\" (เช่น บันทึกภาพสัมมนา, ข่าวสารเวียน Intranet)","แผนการสื่อสารและหลักฐานการสื่อสาร \"ภายนอกองค์กร\" (เช่น ภาพข่าวบนหน้าเว็บไซต์ กทท., โซเชียลมีเดีย, การแจ้งลูกค้าในการประชุม)"],2:["คู่มือค่านิยมหรือประกาศที่ระบุ \"พฤติกรรมพึงประสงค์ (Do & Don't)\" ด้านนวัตกรรมของผู้บริหาร","หลักฐานภาพถ่าย/รายงานการประชุมที่ผู้บริหารลงมามีส่วนร่วมจริง (เช่น เป็น Mentor โครงการ PAT DNA, เป็นประธานมอบรางวัลนวัตกรรม)","ผลการสำรวจ/ประเมินบทบาทการเป็น Role Model ด้านนวัตกรรม"],3:["เอกสารสรุปตัวชี้วัดและเป้าหมายนวัตกรรม ที่แยกมิติ \"การเงิน (เช่น รายได้ 10 ลบ.)\" และ \"ไม่ใช่การเงิน\" ชัดเจน","ตาราง Cascade KPI: เอกสารหรือแผนภาพแสดงการถ่ายทอดเป้าหมายจากองค์กร ลงสู่สายงาน/ฝ่ายงาน และลงลึกถึง \"ผู้รับผิดชอบรายบุคคล\"","เอกสาร/แบบประเมินผลการปฏิบัติงานรายบุคคล (PMS) ที่มีหัวข้อด้านความคิดสร้างสรรค์/นวัตกรรม"],4:["แผนภาพแสดงความเชื่อมโยงยุทธศาสตร์ (Strategy Map / Alignment Table) ระหว่างแผนแม่บท IM กับแผนวิสาหกิจและแผนแม่บทของ Enablers อื่นๆ","รายงานการประชุมคณะทำงาน/ผู้บริหาร ที่แสดงการพิจารณางานด้านนวัตกรรมร่วมกับฝ่ายอื่นๆ (เช่น ฝ่าย IM ประชุมร่วมกับฝ่าย SCM หรือ DT เพื่อนำ VOC มาตั้งเป็นโจทย์นวัตกรรม)"],5:["รายงานการประชุมผู้บริหารระดับสูงที่มีวาระ \"ติดตามผลการดำเนินงานนวัตกรรม\" (รายไตรมาส/รายปี)","เอกสารบันทึกการทบทวนและปรับปรุง (Review & Improvement Record): เอกสารอธิบายการนำ Feedback (เช่น เสียงสะท้อนจากพนักงาน หรือผลงานที่ไม่บรรลุเป้า) มาใช้พิจารณา \"ปรับเปลี่ยน\" นโยบาย แผนงาน หรือ KPI ด้านนวัตกรรมในปีถัดไป"]},subComps:{1:["การครอบคลุม 2 กลุ่มเป้าหมาย: ต้องมีหลักฐานเชิงประจักษ์ว่าสื่อสารครบทั้ง \"บุคลากรภายใน\" และ \"ผู้มีส่วนได้ส่วนเสียภายนอกที่สำคัญ\" หากสื่อสารแค่พนักงานภายใน จะถูกหารคะแนนมิติทันที","วิสัยทัศน์ที่ชัดเจน: หากองค์กรมีวิสัยทัศน์หลักที่สะท้อนถึงนวัตกรรมชัดเจนอยู่แล้ว ไม่ต้องตั้งใหม่ แต่ต้องสื่อสารให้เห็นความเชื่อมโยง"],2:["ความเป็นรูปธรรม (Tangible Action): ผู้ตรวจต้องการเห็น \"การกระทำ (Action)\" ไม่ใช่แค่นโยบาย เช่น รูปภาพผู้บริหารลงพื้นที่ หรือจัดสรรงบพิเศษให้โครงการนวัตกรรม","การประเมินแยกบุคคล (จาก Feedback ปี 68): แบบประเมิน Role Model ต้องออกแบบให้ประเมินผู้บริหาร \"แยกเป็นรายบุคคล\" (เช่น ประเมินผู้อำนวยการ, รองผู้อำนวยการแต่ละสายงาน) ห้ามประเมินแบบเหมารวมเป็นภาพกว้าง"],3:["ความลึกของการกระจายเป้าหมาย (Accountability): จาก Feedback ปี 68 กทท. โดนหักคะแนนเพราะ KPI ยังหยุดอยู่ที่ภาพรวมองค์กร การจะผ่านข้อนี้ \"ต้องโชว์หลักฐานให้เห็นว่านาย A หรือนางสาว B มีเป้าหมาย KPI นวัตกรรมในใบประเมินผลงานของตัวเอง\"","Output vs Outcome: เป้าหมายที่ตั้งต้องสะท้อนผลลัพธ์ (Outcome) ด้วย ไม่ใช่วัดแค่กิจกรรม (Output)"],4:["บูรณาการแบบ Cross-Functional: ผู้ตรวจจะดูว่า IM ทำงานแบบไซโล (Silo) หรือไม่ หากไม่มีหลักฐานการประชุม หรือตารางไขว้ (Mapping) ที่แสดงว่า IM เอาข้อมูลลูกค้า (SCM) มาใช้ หรือเอาไอเดียไปให้ฝ่าย IT (DT) ทำต่อ จะไม่ผ่านเกณฑ์ข้อนี้"],5:["Continuous Improvement (Before & After): ผู้ตรวจต้องการเห็น \"ร่องรอยการเปลี่ยนแปลง\" จากปีที่แล้วสู่ปีปัจจุบัน โดยต้องระบุให้ชัดเจนว่า \"นโยบายที่เปลี่ยนไปนี้ มีที่มาจากการวิเคราะห์ Feedback หรือข้อจำกัดในอดีตอย่างไร\" ไม่ใช่เปลี่ยนนโยบายแบบไม่มีที่มาที่ไป"]},links:[{level:1,dim:"SP"},{level:1,dim:"SCM"},{level:2,dim:"HCM"},{level:3,dim:"SP"},{level:3,dim:"HCM"},{level:4,dim:"SP"},{level:4,dim:"SCM"},{level:4,dim:"DT"},{level:4,dim:"KM"},{level:4,dim:"HCM"},{level:5,dim:"CG"},{level:5,dim:"SP"}]},
"1.2":{scopeNote:"มุ่งเน้นประเมิน \"การจัดทัพองค์กร\" ตั้งแต่การตั้งคณะกรรมการระดับนโยบาย ไปจนถึงคณะทำงานระดับปฏิบัติการข้ามสายงาน โดยต้องมีกฎบัตรชัดเจน ทุกคนทำงานตามหน้าที่จริง โครงสร้างสอดคล้องกับระบบ CIS และกล้าที่จะ \"ปรับโครงสร้าง\" เมื่อพบปัญหาอุปสรรค",dimLevels:["กำหนดคณะกรรมการนวัตกรรมระดับองค์กร มีกฎบัตรระบุอำนาจหน้าที่ชัดเจน และเผยแพร่ให้พนักงานรับรู้","กำหนดผู้บริหารระดับสูงและผู้รับผิดชอบหลัก ตั้งคณะทำงาน \"ข้ามสายงาน\" พร้อมกำหนดความรับผิดชอบชัดเจน","ทุกคณะกรรมการ ผู้บริหาร และคณะทำงาน ต้อง \"ดำเนินการตามบทบาทหน้าที่ที่กำหนดอย่างครบถ้วน\"","โครงสร้างผู้รับผิดชอบทั้งหมด ต้อง \"สอดคล้องกับระบบนวัตกรรมองค์กร (CIS)\" และเชื่อมโยงกับกระบวนการนวัตกรรม","นำข้อมูลป้อนกลับ (Feedback) มาใช้ \"ปรับปรุงรูปแบบของโครงสร้างผู้รับผิดชอบ/คณะทำงาน\" เพื่อเพิ่มประสิทธิภาพให้สอดคล้องกับทิศทางนวัตกรรม"],minReqs:{1:["คำสั่งแต่งตั้งคณะกรรมการระดับองค์กร (เช่น คณะกรรมการ KMDTIM)","กฎบัตร (Charter) ของคณะกรรมการนวัตกรรมที่เป็นลายลักษณ์อักษร","หลักฐานการเผยแพร่กฎบัตรให้พนักงานรับรู้ (เช่น บันทึกเวียน, หน้า Website/Intranet)"],2:["คำสั่งแต่งตั้งคณะทำงานขับเคลื่อนนวัตกรรม (เช่น Innovation Champion, คณะทำงานต่อยอดนวัตกรรม, Core IM Team, PAT DNA)","โครงสร้างองค์กรและ Job Description (JD) ที่ระบุหน้าที่ความรับผิดชอบด้านนวัตกรรมของผู้รับผิดชอบหลัก (เช่น กองวิจัยและพัฒนาองค์กร)"],3:["รายงานการประชุม (Minutes of Meeting) ของทุกคณะทำงานที่ตั้งไว้ในระดับ 1 และ 2","[แก้ไข Gap สำคัญ] ตารางสรุปการดำเนินงาน (Checklist) ที่นำ \"ข้อบังคับในกฎบัตร\" มาเทียบกับ \"ผลงานที่ทำจริง\" เพื่อพิสูจน์ว่าทำครบถ้วนทุกข้อ"],4:["แผนภาพแสดงระบบนวัตกรรมองค์กร (PAT-CIS) ฉบับอัปเดต","[แก้ไข Gap สำคัญ] แผนภาพโครงสร้างองค์กร (Organization Chart) ที่เอาชื่อคณะทำงานต่างๆ ไปวางแปะ (Mapping) ให้เห็นชัดเจนว่าคณะทำงานชุดไหน รับผิดชอบกลไกไหนในระบบ PAT-CIS"],5:["รายงานผลการประเมินประสิทธิภาพโครงสร้างการทำงาน / รายงานปัญหาอุปสรรค (AAR) ของกระบวนการนวัตกรรม","บันทึก/คำสั่งปรับปรุงโครงสร้าง: เอกสารแสดงการเปลี่ยนแปลงโครงสร้างหรือกลไกการทำงาน"]},subComps:{1:["ความเป็นทางการ: กฎบัตรต้องได้รับการอนุมัติอย่างเป็นทางการ และการสื่อสารต้องพิสูจน์ได้ว่า \"รับรู้ทั่วทั้งองค์กร\" ไม่ใช่รับรู้แค่ในห้องประชุม"],2:["การบูรณาการข้ามสายงาน (Cross-functional): ในคำสั่งแต่งตั้งคณะทำงาน ผู้ตรวจจะขอดูรายชื่อว่ามี \"ตัวแทนจากหลากหลายสายงาน/ฝ่ายงาน\" เข้ามาร่วมด้วยหรือไม่ หากตั้งคณะทำงานที่มีแต่คนของฝ่ายกลยุทธ์ (IM) ล้วนๆ จะโดนหักคะแนนมิตินี้ทันที","คุณสมบัติของผู้รับผิดชอบ: คู่มือ SE-AM ระบุว่าต้องมีการกำหนด \"คุณสมบัติ/คุณลักษณะ\" ของบุคลากรที่มาอยู่ในทีมขับเคลื่อนนวัตกรรม เพื่อใช้ในการสรรหาบุคลากรที่เหมาะสม"],3:["ครบถ้วนตามกฎบัตร: หากในกฎบัตรเขียนว่าคณะทำงานต้อง \"ให้คำปรึกษาและติดตามผลทุกไตรมาส\" ในรายงานการประชุมจะต้องมีวาระการติดตามผลทุกไตรมาส และต้องเห็น \"ข้อเสนอแนะ/คำปรึกษา\" จากกรรมการ ไม่ใช่แค่มีมติ \"รับทราบ\" อย่างเดียว","กระบวนการติดตามผล: ผู้ตรวจระบุชัดเจนว่า กทท. ต้องทบทวนกระบวนการใน \"การติดตามการดำเนินงานตามบทบาทหน้าที่\" ดังนั้นต้องมีรายงานสรุปผลงานของคณะทำงานส่งให้ผู้บริหารรับทราบด้วย"],4:["ไร้รอยต่อ (Seamless Alignment): ในปี 68 ผู้ตรวจคอมเมนต์ว่าให้ กทท. ทบทวนโครงสร้างให้สอดคล้องกับ CIS  หมายความว่า หากใน PAT-CIS มีขั้นตอน \"Open Innovation\" หรือ \"Commercialization (นำไปใช้เชิงพาณิชย์)\" ผู้ตรวจจะถามหาทันทีว่า \"แล้วคณะทำงานชุดไหนเป็นเจ้าภาพรับผิดชอบขั้นตอนนี้?\""],5:["เหตุและผลของการปรับโครงสร้าง (Cause and Effect): ไม่ใช่แค่ออกคำสั่งตั้งคณะทำงานใหม่ แต่ในเอกสารต้องเขียน \"Story\" ให้ชัดเจน ตัวอย่างเช่น กทท. สามารถเคลมคะแนนข้อนี้ได้จากการตั้ง \"คณะทำงานพัฒนาต่อยอดความคิดสร้างสรรค์และนวัตกรรม\" โดยเขียนระบุในรายงานว่า \"สืบเนื่องจากปัญหาที่โครงการนวัตกรรม (PAT DNA) ไม่สามารถนำไปต่อยอดใช้งานจริงได้เนื่องจากติดขัดปัญหาการประสานงานข้ามฝ่าย (Feedback) กทท. จึงได้ปรับปรุงโครงสร้างโดยจัดตั้งคณะทำงานต่อยอดฯ ที่ประกอบด้วยตัวแทนระดับผู้อำนวยการฝ่าย (Action) เพื่อเพิ่มประสิทธิภาพการนำนวัตกรรมไปใช้จริง (Result)\" การเขียนเชื่อมโยงเหตุและผลแบบนี้คือสิ่งที่ผู้ตรวจมองหาในระดับ 5"]},links:[{level:1,dim:"HCM"},{level:2,dim:"HCM"},{level:2,dim:"CG"},{level:3,dim:"ระดับนี้เป็นการพิสูจน์ว่าคณะทำงานลงมือทำงานจริง ดังนั้นหลักฐานคือ \"รายงานการประชุมคณะทำงาน\" ที่ไปขับเคลื่อนหมวดอื่นๆ  (IM6.2, IM6.3)"},{level:4,dim:"ระบบนวัตกรรมองค์กร (CIS) (IM 6.1)"},{level:5,dim:"CG/ผู้บริหาร/HCM"}]},
"2.1":{scopeNote:"มุ่งเน้นประเมิน \"กระบวนการจัดทำแผนแม่บทนวัตกรรม\" ตั้งแต่การดึงผู้บริหารและทุกสายงานมามีส่วนร่วม, การวิเคราะห์สภาพแวดล้อม (SWOT/ปัจจัยนำเข้า 8 ประการ), การตั้งเป้าหมายระยะสั้น-ยาวที่ท้าทาย, การสื่อสารแผนให้ทั่วถึง และที่สำคัญที่สุดคือ \"ระบบติดตามงานที่รวดเร็ว (Agile)\" เพื่อให้พร้อมปรับเปลี่ยนหรือยกเลิกโครงการได้ทันท่วงทีเมื่อสถานการณ์เปลี่ยน",dimLevels:["ผู้บริหารและหน่วยงานที่เกี่ยวข้องมีส่วนร่วมในการจัดทำแผนยุทธศาสตร์และแผนปฏิบัติการด้านการจัดการนวัตกรรมระยะสั้นและระยะยาว","วิเคราะห์สภาพแวดล้อมทั้งภายในและภายนอก และข้อมูลที่เกี่ยวข้อง เพื่อให้แผนตอบสนองต่อวิสัยทัศน์ พร้อมกำหนดเป้าหมายทั้งระยะสั้นและระยะยาวอย่างชัดเจน รวมถึงตัวชี้วัด (KPI)","การสื่อสาร ถ่ายทอดแผนยุทธศาสตร์และแผนปฏิบัติการไปยังผู้ที่เกี่ยวข้องให้นำไปปฏิบัติและรับรู้อย่างทั่วถึง","มีระบบติดตาม/ประเมินผลการดำเนินงาน เพื่อให้การทบทวนแผนงานการจัดการนวัตกรรม รวดเร็ว ทันการณ์และตอบสนองต่อการเปลี่ยนแปลง","นำผล/ข้อมูลสารสนเทศที่ได้จากการทบทวนไปใช้ในการตัดสินใจปรับปรุงการดำเนินงาน หรือปรับการจัดสรรทรัพยากร เพื่อเพิ่มประสิทธิภาพให้มีผลสำเร็จที่ดีกว่าเป้าหมาย และดีกว่าปีที่ผ่านมา"],minReqs:{1:["แผนแม่บทการจัดการนวัตกรรมระยะยาว (เช่น ปี 2568-2572) และแผนปฏิบัติการประจำปี","รายงานการประชุม/ภาพถ่าย การจัดสัมมนาวิพากษ์แผน (Workshop) ที่มีผู้บริหารระดับสูงและผู้แทนจากสายงานต่างๆ เข้าร่วมพิจารณาแผน"],2:["บทวิเคราะห์สภาพแวดล้อม (SWOT / PESTEL) ที่ระบุในเล่มแผนแม่บทฯ","เอกสารแสดงการวิเคราะห์ปัจจัยนำเข้า 8 ประการ (เช่น นโยบายรัฐ, สัญญาณบ่งชี้/ทิศทางการเปลี่ยนแปลงที่สำคัญ, กรอบการบริหารจัดการความรู้ และกรอบการพัฒนานวัตกรรม, แผนวิสาหกิจ, ผลการพัฒนา, ความเสี่ยง, ปัจจัยขับเคลื่อน , แผนแม่บทอื่นที่เกี่ยวข้อง (แผนปฏิบัติการดิจิทัล แผน HR Master Plan เป็นต้น))","ตารางสรุปเป้าหมายนวัตกรรมระยะสั้น (1 ปี) และระยะยาว (3-5 ปี) พร้อม KPI ที่วัดผลได้"],3:["แผนการสื่อสารและช่องทางการถ่ายทอดแผนแม่บทนวัตกรรม","หลักฐานการเผยแพร่แผนไปยังกลุ่มเป้าหมาย (เช่น งาน Townhall, Website, Intranet, หนังสือเวียน)","[แก้ไข Gap สำคัญ] ผลประเมินการรับรู้และความเข้าใจในแผนแม่บทนวัตกรรม"],4:["ระบบติดตามประเมินผลโครงการนวัตกรรม (เช่น ผ่านระบบ PAT-CIS หรือ Dashboard)","รายงานการประชุมของคณะทำงานนวัตกรรมที่มีวาระ \"ติดตามความคืบหน้าของโครงการ\" (รายเดือน/รายไตรมาส)"],5:["เอกสารบันทึกการปรับเปลี่ยนแผนงาน/ทรัพยากร (Revision Record): ที่แสดงให้เห็นว่า กทท. มีการ \"โยกงบประมาณ\" หรือ \"ปรับเพิ่มกำลังคน\" ให้กับโครงการนวัตกรรมที่มีแนวโน้มสำเร็จสูง (จากการติดตามใน Level 4)","ข้อมูลเปรียบเทียบ (Before & After) ที่พิสูจน์ว่าหลังจากการปรับแผนแล้ว ผลสำเร็จของโครงการออกมา \"ดีกว่าเป้าหมายที่ตั้งไว้ และดีกว่าผลงานในปีที่ผ่านมา\" อย่างเป็นรูปธรรม"]},subComps:{1:["การมีส่วนร่วมข้ามสายงาน (Cross-functional Participation): ผู้ตรวจไม่ได้อยากเห็นแค่ลายเซ็นอนุมัติแผนของ ผอ. แต่ต้องการหลักฐานที่พิสูจน์ว่า \"ฝ่ายอื่นๆ (เช่น ฝ่ายการเงิน, ฝ่ายลูกค้า, ฝ่าย IT) ได้เข้ามาร่วมออกความเห็นตอนร่างแผนนวัตกรรมด้วย\" เพื่อป้องกันการทำแผนแบบไซโล (Silo)"],2:["เป้าหมายระดับผลลัพธ์ที่ท้าทาย (Challenging Outcome): กทท. โดนหักคะแนนจุดนี้ในปี 68 เพราะผู้ตรวจมองว่า \"เป้าหมายระยะสั้น/ยาวยังขาดความท้าทายและไม่สะท้อนการเติบโต\"  วิธีแก้คือ ต้องตั้งเป้าที่เป็น Outcome ชัดเจน (เช่น ลดต้นทุนได้กี่บาท, ลดเวลาบริการได้กี่นาที) และ \"ต้องนำตัวเลขเป้าหมายนี้ ไปเทียบกับคู่เทียบระดับโลก\" ให้ผู้ตรวจเห็นว่าเป้าของเราท้าทายจริงๆ"],3:["คุณภาพของการรับรู้ (Effectiveness of Communication): ในปี 68 กทท. โดนคอมเมนต์ว่าประเมินการรับรู้ผ่านออนไลน์ได้เพียง 35.9% ซึ่งถือว่าต่ำ ผู้ตรวจซ่อนความคาดหวังไว้ว่า \"ไม่ได้ดูแค่ว่าสื่อสารกี่ครั้ง แต่ดูว่าคนเข้าใจและรับรู้กี่เปอร์เซ็นต์\" กทท. ต้องทำผลสำรวจการรับรู้ (Survey) ให้ได้เปอร์เซ็นต์ที่สูงขึ้นเพื่อยืนยันความทั่วถึง"],4:["ความรวดเร็วทันกาล (Agility & Trigger Point): จุดตายของ กทท. ในปี 68 คือ ผู้ตรวจมองว่าระบบติดตาม \"ไม่ทันกาลพอที่จะให้ผู้บริหารสั่งปรับแผนหรือล้มเลิกโครงการได้\"  วิธีแก้คือ ในรายงานการติดตามผล ต้องระบุ \"Trigger Point (จุดตัดเตือนภัย)\" เช่น หากโครงการ A ใช้งบเกิน 20% หรือล่าช้าเกิน 1 ไตรมาส ให้รายงานผู้บริหารทันทีเพื่อพิจารณาปรับแผน (Pivot) หรือยกเลิก (Kill) โครงการ ซึ่งหลักฐานการมีมติให้ปรับปรุงแผนระหว่างทางนี้คือสิ่งที่ผู้ตรวจต้องการเห็นในระดับ 4"],5:["Evidence-Based Decision Making: การปรับแผนหรือโยกงบประมาณต้องมี \"เหตุผลอ้างอิงจากข้อมูล (Data-driven)\" เสมอ ไม่ใช่สั่งปรับตามความรู้สึก เช่น \"รายงานไตรมาส 2 พบว่าแอป LCP Traffic มีผู้ใช้งานทะลุเป้า ผู้บริหารจึงมีมติอนุมัติงบเพิ่มอีก 1 ล้านบาทเพื่อขยายเซิร์ฟเวอร์ด่วน ผลลัพธ์คือระบบเสถียรขึ้นและช่วยลดเวลารถบรรทุกได้เกินกว่าเป้าหมายเดิมที่ตั้งไว้\""]},links:[{level:1,dim:"SP"},{level:2,dim:"SP"},{level:2,dim:"SCM"},{level:2,dim:"DT"},{level:2,dim:"RM&IC"},{level:3,dim:"SCM"},{level:4,dim:"SP"},{level:5,dim:"IM7.1"},{level:5,dim:"IM2.2"},{level:5,dim:"SP"}]},
"2.2":{scopeNote:"มุ่งเน้นประเมินความสามารถในการ \"จัดสรร (Allocate) และ จัดลำดับ (Prioritize)\" ทรัพยากรที่มีอยู่อย่างจำกัด (ทั้งเงิน คน และเทคโนโลยี) ให้กับโครงการนวัตกรรมอย่างคุ้มค่า มีการสร้างเกณฑ์วัดผลที่เข้มข้น สอดคล้องกับยุทธศาสตร์หลักขององค์กร และต้องมีความยืดหยุ่น (Agile) ที่จะประเมินและโยกย้ายทรัพยากรได้ทันที \"ระหว่างการดำเนินงาน\"",dimLevels:["กำหนดหลักเกณฑ์การจัดสรรทรัพยากรด้านนวัตกรรม เพื่อนำไปสู่การจัดสรรทรัพยากรทางการเงินและไม่ใช่การเงินได้อย่างมีประสิทธิภาพ","นำหลักเกณฑ์มาใช้จัดลำดับความสำคัญ (Prioritization) ของแผนงาน/โครงการ เพื่อจัดสรรทรัพยากรให้แต่ละโครงการอย่างเป็นระบบ","รัฐวิสาหกิจจัดสรรทรัพยากรทางการเงินและไม่ใช่การเงิน ครอบคลุมแผนการดำเนินงานด้านการจัดการนวัตกรรมที่สำคัญ","การจัดสรรทรัพยากรสอดคล้องกับแผนงานด้านการจัดการนวัตกรรม และ \"สอดคล้องกับแนวทางการจัดสรรทรัพยากรขององค์กร (แผนวิสาหกิจ)\"","การประเมิน \"ความเพียงพอของทรัพยากรระหว่างการดำเนินงาน\" เพื่อปรับปรุงการจัดสรรทรัพยากร และทบทวนเพื่อให้มั่นใจว่ามีงบ/คนพร้อมต่อการทำงานอย่างต่อเนื่องจนบรรลุเป้าหมาย"],minReqs:{1:["คู่มือการบริหารจัดการนวัตกรรม หรือประกาศ ที่ระบุ \"เกณฑ์การจัดสรรทรัพยากร\" ชัดเจนเป็นลายลักษณ์อักษร","ผังกระบวนการ (SIPOC) การจัดสรรทรัพยากรด้านนวัตกรรม"],2:["เอกสาร/ตารางสรุป \"ผลการให้คะแนนและจัดลำดับความสำคัญของโครงการ (Project Ranking/Scoring)\" ประจำปี"],3:["รายงานผลการจัดสรรงบประมาณจริง (เช่น เอกสารอนุมัติงบ 12.789 ล้านบาทให้กับโครงการนวัตกรรมที่ผ่านการคัดเลือก)","คำสั่งมอบหมายงาน/แต่งตั้งบุคลากร (เช่น คำสั่งให้กองวิจัยและพัฒนาองค์กรเป็นผู้รับผิดชอบหลัก) ซึ่งถือเป็นการจัดสรรทรัพยากรด้านบุคคล"],4:["ตารางแสดงความเชื่อมโยง (Alignment Mapping) ระหว่าง \"แผนงบประมาณโครงการนวัตกรรม\" กับ \"แผนวิสาหกิจ/แผนยุทธศาสตร์องค์กร\""],5:["รายงานความคืบหน้าการดำเนินงานนวัตกรรมรายไตรมาส (Q1-Q4) ที่มี \"วาระการประเมินความเพียงพอของทรัพยากร\"","บันทึกมติที่ประชุม/คำสั่งอนุมัติ \"การโยกย้าย, เพิ่มเติม, หรือชะลอทรัพยากร (Resource Re-allocation)\" ระหว่างปี"]},subComps:{1:["ความครอบคลุมของทรัพยากร (Financial & Non-Financial): เกณฑ์ที่ตั้งขึ้นจะต้องไม่ได้พูดถึงแค่ \"การแจกเงินงบประมาณ\" แต่ต้องมีเกณฑ์ที่ครอบคลุมถึง \"คน (บุคลากร), เวลา (Man-hour), และระบบเทคโนโลยี\" ด้วย หากเขียนระบุแค่เรื่องงบประมาณ จะโดนหารคะแนนมิตินี้"],2:["ความเข้มข้นของมิติการประเมิน (Rigorous Criteria): แม้ กทท. จะมีเกณฑ์ 5 ประเด็นหลักแล้ว แต่ผู้ตรวจคอมเมนต์ชัดเจนว่า กทท. ต้องวิเคราะห์เพิ่มเติมในประเด็น \"ความต้องการคน/ระบบ\" และ \"การประเมินความเสี่ยงของโครงการ\" ดังนั้น ในใบให้คะแนนโครงการของคณะกรรมการ ต้องมีช่องให้คะแนนเรื่อง ความเสี่ยงในการลงทุน และ ข้อจำกัดด้านบุคลากร ปรากฏให้ผู้ตรวจเห็นอย่างเด่นชัด"],3:["การจัดสรรจริง (Actual Allocation): เกณฑ์ระดับนี้ไม่ได้ดูแค่ \"คำขอตั้งงบ (Budget Request)\" แต่ผู้ตรวจจะขอดู \"การอนุมัติจัดสรรเงิน/คน จริงๆ (Allocated Budget)\" หากทำเป็นแค่แผนบนกระดาษแต่ไม่เกิดการเบิกจ่ายงบให้โครงการ จะไม่ผ่าน Level นี้"],4:["การบูรณาการข้ามสายงาน (Cross-functional Alignment): ผู้ตรวจต้องการเห็นว่า การที่ฝ่ายกลยุทธ์ (IM) ขอเงินและขอคนไปทำนวัตกรรมนั้น \"ไม่ได้ไปขัดแย้งหรือทับซ้อนกับนโยบายรัดเข็มขัด (ถ้ามี) หรือแผนงบประมาณหลักขององค์กร\" ต้องพิสูจน์ให้เห็นว่ากระบวนการจัดสรรทรัพยากรนวัตกรรม เป็นเนื้อเดียวกันกับการพิจารณางบประมาณประจำปีของ กทท. โดยฝ่ายการเงินและบัญชีรับทราบและสนับสนุน"],5:["ความยืดหยุ่นและการบริหารจัดการข้อจำกัด (Agility & Constraint Management): นี่คือจุดชี้ชะตา Level 5! ผู้ตรวจต้องการเห็น \"การแก้ปัญหาหน้างาน\" เช่น หากรายงานไตรมาส 2 พบว่า \"โครงการแอป LCP Traffic ขาดแคลนโปรแกรมเมอร์ (คนไม่พอ)\" กทท. ต้องโชว์หลักฐานให้เห็นว่า ผู้บริหารได้มีมติ \"โยกย้ายบุคลากรจากฝ่ายอื่นมาช่วยชั่วคราว\" หรือ \"อนุมัติงบจ้าง Outsource ด่วน\" เพื่อแก้ปัญหาการขาดแคลนทรัพยากรระหว่างทางให้สำเร็จ การมีหลักฐาน Feedback Loop แบบนี้คือการตอกฝาโลงกวาดคะแนนเต็ม 5.0"]},links:[{level:1,dim:"SP"},{level:1,dim:"DT"},{level:1,dim:"HCM"},{level:2,dim:"RM&IC"},{level:2,dim:"IM 6.2 (การคัดกรองไอเดีย)"},{level:3,dim:"IM 6.3 (การพัฒนานวัตกรรม)"},{level:4,dim:"SP"},{level:5,dim:"SP"},{level:5,dim:"HCM"}]},
"3.1":{scopeNote:"มุ่งเน้นประเมินความสามารถขององค์กรในการบูรณาการ \"Big Data\" และการรับฟัง \"เสียงลูกค้า (VOC)\" ทั้งกลุ่มปัจจุบันและกลุ่มอนาคต นำมาวิเคราะห์เชิงลึก (Data Analytics) ร่างเป็น Customer Journey เพื่อค้นหา \"ความต้องการที่ยังไม่ถูกเติมเต็ม (Unmet Need)\" แล้วนำความต้องการนั้นมาตั้งเป็นโจทย์ในการพัฒนานวัตกรรมผลิตภัณฑ์/บริการต่อไป",dimLevels:["การรวบรวมข้อมูลที่เป็น Big data ที่เกี่ยวข้องกับกลุ่มลูกค้าทั้งในปัจจุบันและอนาคต (Existing and Potential customers/consumers)","การรวบรวมข้อมูลที่เกิดจากการศึกษาพฤติกรรม การสัมภาษณ์กลุ่มลูกค้าทั้งในปัจจุบันและอนาคต","การวิเคราะห์ข้อมูล (Data Analytic) เพื่อคาดการณ์ความต้องการของกลุ่มลูกค้าทั้งในปัจจุบันและอนาคต","การจัดทำ Customers/Consumers Persona, Customer/Consumers Journey ของกลุ่มลูกค้า ทั้งในปัจจุบันและอนาคต เพื่อหาความต้องการของลูกค้าที่ยังไม่ถูกเติมเต็ม (Unmet Need)","รัฐวิสาหกิจประเมินและปรับปรุงกระบวนการรวบรวมข้อมูลและสารสนเทศเพื่อการพัฒนานวัตกรรมมุ่งเน้นลูกค้าและตลาด เพื่อเพิ่มประสิทธิภาพของการดำเนินการให้มีผลสำเร็จที่ดีกว่าเป้าหมายและดีขึ้นกว่าปีที่ผ่านมา"],minReqs:{1:["ผังกระบวนการ (SIPOC) แนวทางการรวบรวมข้อมูลลูกค้า","ภาพหน้าจอ (Screen Capture) ของระบบสารสนเทศที่เป็น Big Data (เช่น ระบบ PCS, PAT FIT, SAP, E-Gate, Marine Traffic)"],2:["ประเด็นคำถาม/แบบฟอร์มการสัมภาษณ์เชิงลึก (In-depth Interview) หรือ Focus Group สำหรับลูกค้ากลุ่มอดีต ปัจจุบัน และอนาคต","รายงานสรุปผล/บันทึกข้อมูลการสัมภาษณ์กลุ่มลูกค้า (โดยเฉพาะการแยกรายงานผลสัมภาษณ์ของกลุ่ม \"ลูกค้าในอนาคต\" ออกมาให้เห็นชัดเจน)"],3:["รายงานผลการวิเคราะห์ข้อมูล (Data Analytics Report) ที่สะท้อนความต้องการของลูกค้า","[แก้ไข Gap สำคัญ] ภาพหน้าจอกระบวนการนำเทคโนโลยี AI มาประมวลผลข้อมูล (เช่น การแสดงผล Dashboard ของระบบ PAT EDW ที่ใช้ Large Language Model (LLM))"],4:["เอกสารแผนภาพเส้นทางการเดินทางของลูกค้า (Customer Journey) และจุดสัมผัสบริการ (Touch Point)","ตารางสรุปความต้องการที่ยังไม่ถูกเติมเต็ม (Unmet Need) และการระบุแนวทางการพัฒนาผลิตภัณฑ์/บริการใหม่เพื่อตอบสนองความต้องการนั้น"],5:["รายงานผลการประเมินประสิทธิภาพของระบบการเก็บและวิเคราะห์ข้อมูล (AAR ของกระบวนการทำ Data Analytics)","หลักฐานเชิงประจักษ์ในการปรับปรุงกระบวนการ (Before & After)"]},subComps:{1:["การครอบคลุมลูกค้าระยะอนาคต (Future Target): เกณฑ์บังคับคำว่า \"ทั้งในปัจจุบันและอนาคต\" อย่างชัดเจน ดังนั้น ในรายงานการรวบรวมข้อมูล กทท. จะต้องนิยามและระบุให้ชัดว่า \"กลุ่มลูกค้าอนาคต\" คือใคร (เช่น กลุ่มผู้ใช้บริการ Free Zone หรือ Dry Port) และแสดงให้เห็นว่าระบบของ กทท. มีการจัดเก็บฐานข้อมูลของคนกลุ่มนี้ไว้ด้วย"],2:["ข้อมูลเชิงคุณภาพ (Qualitative Data): Level 1 คือการดึง Big Data เชิงปริมาณ (Quantitative) แต่ Level 2 ผู้ตรวจต้องการเห็นการลงพื้นที่เพื่อดึงข้อมูลเชิงคุณภาพ (Qualitative) ผ่านการ \"สัมภาษณ์\" เพื่อให้เข้าใจถึงก้นบึ้งของพฤติกรรมลูกค้า  หากส่งแค่ผลแบบสอบถามความพึงพอใจติ๊กคะแนน 1-5 แบบเดิมๆ อาจถูกหารคะแนนในมิตินี้"],3:["Predictive Analysis (การพยากรณ์ ไม่ใช่แค่รายงานอดีต): นี่คือจุดตายของ กทท. ในปี 68! ผู้ตรวจระบุว่า \"การทำ Data Analytics เพื่อพยากรณ์ (Predictive) ความต้องการของกลุ่มลูกค้าในอนาคตยังไม่ชัดเจน\"  กทท. ต้องแก้เกมโดยนำรูปแบบของ กทพ. (EXAT) มาปรับใช้ คือต้องเขียนรายงานให้เห็นว่าเราใช้ระบบ PAT EDW และ AI ทำ \"Deep Analysis\" เพื่อคาดการณ์ว่าปีหน้าลูกค้าจะต้องการอะไร หรือจะมีพฤติกรรมเปลี่ยนไปอย่างไร"],4:["Bridging the Gap (การส่งต่อโจทย์นวัตกรรม): เกณฑ์ข้อนี้ต้องการดูว่า หลังจากทำ Customer Journey แล้วเจอ Pain point หรือ Unmet Need แล้ว กทท. \"นำโจทย์นี้ส่งต่อไปเข้ากระบวนการคิดค้นนวัตกรรม (Front End Innovation - ข้อ 6.2)\" หรือไม่?  เอกสารตารางสรุป Unmet Need ต้องมีคอลัมน์สุดท้ายที่เขียนว่า \"ข้อเสนอนี้นำไปตั้งเป็นโจทย์ในการประกวด PAT DNA ปี 2568\" เพื่อแสดงความเชื่อมโยง"],5:["Technology-Driven Improvement: เพื่อให้ได้ Level 5 กทท. สามารถเคลมผลงานเรื่องการ \"อัปเกรดนำระบบ AI (LLM) เข้ามาใช้ในระบบ PAT EDW\" เป็นหลักฐานในการปรับปรุงกระบวนการได้เลยครับ โดยอธิบายในรายงานว่า \"จากเดิมใช้คนวิเคราะห์ข้อมูล Big Data ซึ่งใช้เวลาหลายวัน (Before) กทท. ได้ปรับปรุงกระบวนการโดยนำเทคโนโลยี AI มาช่วยประมวลผล ทำให้สามารถสร้าง Report Dashboard ได้ภายในไม่กี่นาที (After) ซึ่งเพิ่มประสิทธิภาพรวดเร็วกว่าเป้าหมายที่ผ่านมา\"  การเขียนเชื่อมโยงเหตุและผลแบบนี้คือผลลัพธ์ของการปรับปรุงที่ผู้ตรวจต้องการ"]},links:[{level:1,dim:"SCM"},{level:1,dim:"DT"},{level:2,dim:"SCM"},{level:3,dim:"DT"},{level:3,dim:"SP"},{level:4,dim:"SCM"},{level:4,dim:"IM 6.2 (กระบวนการใช้ความคิดสร้างสรรค์)"},{level:5,dim:"KM"},{level:5,dim:"DT"}]},
"4.1":{scopeNote:"มุ่งเน้นประเมินการเปลี่ยนบทบาทของ KM จาก \"ห้องสมุดเก็บเอกสาร\" ให้กลายเป็น \"เครื่องมือสร้างนวัตกรรม\" (Knowledge-based Innovation) โดยต้องมีการตั้งตัวชี้วัด (KPI) เทียบกับคู่แข่งระดับโลก และนำบทเรียน (AAR) หรือความรู้จากชุมชนนักปฏิบัติ (CoP) ไปต่อยอดสร้างผลิตภัณฑ์ บริการ หรือกระบวนการใหม่ที่ \"สร้างมูลค่าเพิ่ม (Value Added)\" ให้กับองค์กรได้จริง",dimLevels:["การกำหนดตัวชี้วัดที่สำคัญ (และค่าเป้าหมาย) ขององค์กรในเชิงบูรณาการ จากทุกแหล่งทั้งภายในและภายนอกองค์กร","การวัดและวิเคราะห์ผลสำเร็จเชิงเปรียบเทียบในกลุ่มตัวชี้วัดที่สำคัญขององค์กร เพื่อทำให้ตัวชี้วัดบรรลุได้ตามเป้าหมาย ดีกว่าคู่แข่ง/คู่เทียบ และมีแนวโน้มของผลการดำเนินงานที่ดีขึ้นอย่างต่อเนื่อง","การกำหนดแนวทางการเรียนรู้ การจัดการความรู้ เพื่อนำไปสู่การปรับปรุงและนวัตกรรมผลิตภัณฑ์และบริการ การปรับปรุงกระบวนการทำงานที่สำคัญ การตลาด และรูปแบบธุรกิจใหม่ เพื่อสร้างมูลค่าเพิ่มให้กับองค์กรอย่างต่อเนื่อง","รัฐวิสาหกิจทบทวนและวิเคราะห์ระบบงานและ/หรือกระบวนการย่อย จัดเก็บในระบบฐานข้อมูลเทคโนโลยีดิจิทัลขององค์กร","รัฐวิสาหกิจปรับปรุงและพัฒนาระบบงานและ/หรือกระบวนการย่อย เพื่อเพิ่มประสิทธิภาพการปฏิบัติงานให้มีผลสำเร็จที่ดีกว่าเป้าหมาย และดีกว่าปีที่ผ่านมา"],minReqs:{1:["เอกสารหลักเกณฑ์และกระบวนการคัดเลือกตัวชี้วัดที่สำคัญขององค์กร","ตารางสรุปตัวชี้วัดสำคัญด้านนวัตกรรม ที่ระบุแหล่งที่มาของข้อมูลอย่างชัดเจน"],2:["รายงานการวิเคราะห์เปรียบเทียบคู่เทียบ (Benchmarking Report): ที่นำผลงานของ กทท. ไปเทียบกับคู่แข่งหรือคู่เทียบ"],3:["รายงานสรุปบทเรียน (AAR) หรือ รายงานผลการจัดกิจกรรมชุมชนนักปฏิบัติ (CoP) ที่เกี่ยวข้องกับโครงการนวัตกรรม","[แก้ไข Gap สำคัญ] เอกสารแสดงผลลัพธ์การสร้างมูลค่าเพิ่ม (Value Added Report): ที่ระบุว่าได้นำความรู้จาก AAR หรือ CoP นั้น ไปต่อยอดเป็นผลิตภัณฑ์/บริการ/กระบวนการใหม่ที่สำเร็จเป็นรูปธรรม"],4:["เอกสารรายงานการทบทวนระบบงาน (Work System / Sub-process)","ภาพหน้าจอ (Screen Capture) ของระบบ PAT KM Portal หรือ ฐานข้อมูลดิจิทัลที่แสดงให้เห็นการจัดเก็บกระบวนการย่อยหรือองค์ความรู้ด้านนวัตกรรม"],5:["ตารางแสดงผลการเปรียบเทียบ (Before & After) ของกระบวนการทำงาน/ระบบงานที่ได้รับการปรับปรุงจากฐานความรู้"]},subComps:{1:["บูรณาการแหล่งข้อมูลภายนอก (External Sources): ผู้ตรวจต้องการเห็นตัวชี้วัดที่อ้างอิงจากมาตรฐานสากลด้วย ไม่ใช่ตั้งขึ้นมาเองภายในองค์กรเพียงอย่างเดียว เช่น การนำข้อมูลจาก World Bank, ดัชนี LPI (Logistic Performance Index) หรือมาตรฐานท่าเรือระดับโลก มาเป็นส่วนหนึ่งในการตั้งเป้าหมาย"],2:["ความหลากหลายและท้าทายของคู่เทียบ (Challenging Benchmarks): กทท. โดนหักคะแนนในจุดนี้เพราะผู้ตรวจระบุว่า \"ควรเพิ่มเติมการศึกษาแนวทางเลือกใช้คู่แข่ง/คู่เทียบที่หลากหลายและเหมาะสมยิ่งขึ้น\" กทท. ต้องไม่เทียบแค่ผลงานตัวเองในอดีต แต่ต้องกางตัวเลขเทียบกับ ท่าเรือสิงคโปร์ (PSA) หรือ ท่าเรือมาเลเซีย ในตัวชี้วัดสำคัญ (เช่น ระยะเวลารับ-ส่งตู้สินค้า) เพื่อแสดงความท้าทายอย่างแท้จริง"],3:["KM ต้องแปลงเป็น IM (Storytelling is key): ผู้ตรวจคอมเมนต์ชัดเจนว่า กทท. ต้อง \"นำบทเรียนมาเผยแพร่แลกเปลี่ยนระหว่างสายงาน ... จนทำให้องค์กรสามารถพัฒนานวัตกรรมที่มีผลสำเร็จดีขึ้น\""],4:["การเข้าถึงของสายงานอื่น (Cross-functional Access): การจัดเก็บในระบบดิจิทัลต้องพิสูจน์ได้ว่า \"สายงานอื่นสามารถเข้ามาสืบค้นและนำไปใช้งานต่อได้\" เพื่อแสดงให้เห็นถึงการแบ่งปันความรู้ทั่วทั้งองค์กร (Open Knowledge)"],5:["Evidence-Based Performance: ผลการดำเนินงานต้องพิสูจน์ด้วยตัวเลขเชิงปริมาณที่ชัดเจนว่า การนำความรู้มาพัฒนานวัตกรรมนั้น ส่งผลให้ตัวชี้วัดหรือ SLA ของกระบวนการย่อย \"บรรลุดีกว่าเป้าหมายที่ตั้งไว้ และดีกว่าผลการดำเนินงานในปีที่ผ่านมา\""]},links:[{level:1,dim:"SP"},{level:1,dim:"HCM"},{level:2,dim:"SP"},{level:2,dim:"IM 6.2 (กระบวนการใช้ความคิดสร้างสรรค์)"},{level:3,dim:"KM"},{level:4,dim:"DT"},{level:4,dim:"KM"},{level:5,dim:"SP"},{level:5,dim:"ดึงข้อมูลปัญหาและสถิติจากระบบฐานข้อมูลใน Level 4 มาใช้"}]},
"5.1":{scopeNote:"มุ่งเน้นประเมินการสร้าง \"ดีเอ็นเอนวัตกรรม\" ให้ฝังรากลึกในองค์กร ผ่านการกำหนดค่านิยมที่ชัดเจน การออกแบบแผนกิจกรรมและระบบ \"รางวัล/แรงจูงใจ\" ที่ตอบโจทย์พนักงานจริงๆ การสำรวจหาช่องว่าง (Gap) ของวัฒนธรรม และที่สำคัญที่สุดคือ การพิสูจน์ให้เห็นว่า \"พฤติกรรมของพนักงานเปลี่ยนไปในทางที่ดีขึ้นจริง (Behavioral Change)\"",dimLevels:["การกำหนดค่านิยมที่สะท้อนถึงการใช้ความคิดสร้างสรรค์และการจัดการนวัตกรรมอย่างชัดเจน มีการสื่อสารค่านิยม และจัดทำแผนการปลูกฝังค่านิยมฯ ระยะยาวและประจำปี","แผนการปลูกฝังค่านิยมและเสริมสร้างวัฒนธรรมฯ ถูกออกแบบให้ \"สอดคล้องกับบริบทและความต้องการ\" ในแต่ละปีที่เปลี่ยนไป (เช่น การจัดสภาพแวดล้อม, การให้ค่าตอบแทน/รางวัล) และมีการถ่ายทอดแผนแก่ผู้เกี่ยวข้อง","การดำเนินการตามแผนการปลูกฝังค่านิยมและเสริมสร้างวัฒนธรรมประจำปี \"จนบรรลุตามเป้าหมายที่กำหนด\"","การ \"สำรวจค่านิยมและวัฒนธรรมองค์กรที่มุ่งเน้นนวัตกรรม\" เพื่อให้ทราบถึงช่องว่าง (Gap) ในการปรับปรุง ให้แผนสอดคล้องกับวัฒนธรรมองค์กร","การนำข้อมูลป้อนกลับ (Feedback) จากการสำรวจ ไปใช้ปรับปรุงการปลูกฝังค่านิยมฯ เพื่อเพิ่มประสิทธิภาพให้ผลสำเร็จ \"ดีกว่าเป้าหมายและดีขึ้นกว่าปีที่ผ่านมา\" และ \"ได้รับการยอมรับจากผู้มีส่วนได้ส่วนเสีย\""],minReqs:{1:["คู่มือค่านิยมและวัฒนธรรมองค์กร ที่ระบุค่านิยมด้านนวัตกรรมและ \"พฤติกรรมพึงประสงค์ (Do & Don't)\" ไว้อย่างชัดเจน","แผนแม่บทเสริมสร้างค่านิยมและวัฒนธรรมองค์กร (ระยะยาวและประจำปี)","แผนการสื่อสารและหลักฐานการเผยแพร่ค่านิยมไปยังผู้ที่เกี่ยวข้อง"],2:["รายงานผลสำรวจความต้องการของบุคลากร (Need Analysis): เอกสารที่ระบุว่าพนักงานต้องการกิจกรรมรูปแบบไหน หรืออยากได้รางวัลแบบไหน","แผนปฏิบัติการที่ระบุกิจกรรมเสริมสร้างสภาพแวดล้อม และระบบแรงจูงใจ (Incentive) ที่อ้างอิงจากผลสำรวจ"],3:["สรุปผลการดำเนินงานตามแผนปฏิบัติการเสริมสร้างค่านิยมฯ","[แก้ไข Gap สำคัญ] เอกสารแสดงผลสัมฤทธิ์ระดับ Outcome: รายงานผลประเมินตัวชี้วัด \"พฤติกรรมพึงประสงค์ที่เปลี่ยนไป\" ไม่ใช่แค่วัดจำนวนคนเข้าร่วมกิจกรรม"],4:["รายงานผลการสำรวจค่านิยมและวัฒนธรรมองค์กร (Culture Survey) ประจำปี","บทวิเคราะห์ช่องว่าง (Culture Gap Analysis) เฉพาะมิติด้านนวัตกรรม (Agility)"],5:["รายงานเปรียบเทียบคะแนนวัฒนธรรมองค์กร (Year-over-Year): ตารางแสดงให้เห็นว่าคะแนนพฤติกรรม A-Agility มีการเติบโตขึ้นอย่างต่อเนื่อง (เช่น จาก 4.51 เป็น 4.55)","บันทึกการทบทวนแผนปฏิบัติการในปีถัดไป (นำ Feedback ไปทำอะไรต่อ)"]},subComps:{1:["ความชัดเจนของ Core Value: กทท. ทำข้อนี้ได้ดีแล้วโดยการปรับค่านิยมองค์กรเป็น \"SMART PAT\" ซึ่งตัว A - Agility (พร้อมรับการเปลี่ยนแปลง ด้วยการสร้างสรรค์นวัตกรรมสิ่งใหม่) คือจุดขายหลักที่ต้องชูให้ผู้ตรวจเห็นชัดๆ ในคู่มือ"],2:["Customized Incentive (รางวัลที่โดนใจพนักงาน): นี่คือจุดที่ กทท. มีผลงานเด่นในปี 68 แล้ว! กทท. ได้ทำการสำรวจความต้องการรางวัลโครงการ PAT DNA พบว่า พนักงานต้องการ \"เงินรางวัล\" สูงสุด (ร้อยละ 39) กทท. จึงปรับเปลี่ยนนโยบายให้รางวัลเป็น \"เงินสด 30,000 บาท ควบคู่กับการอบรมในประเทศ\" แทนการดูงานต่างประเทศ การนำผลสำรวจมาปรับรูปแบบรางวัลแบบนี้แหละ คือ หลักฐานชั้นดีที่ผู้ตรวจอยากเห็นในระดับ 2!","รูปแบบกิจกรรมที่ตรงจริตพนักงาน: นอกจากการจัด Classroom แล้ว การเพิ่มกิจกรรมรูปแบบ Site Visit (เช่น ไปดูงานบริษัท เงินติดล้อ จำกัด (มหาชน)) ตามที่ผลสำรวจพนักงานต้องการ เป็นตัวเสริมความสมบูรณ์ของแผนได้ดีมาก"],3:["Behavioral Change KPI (เป้าหมายการเปลี่ยนพฤติกรรม): กทท. โดนติติงเรื่องการตั้งเป้าหมายที่วัดแค่ Output ในปี 68 กทท. จึงได้ตั้งเป้าหมายว่า \"พนักงาน กทท. มีการเปลี่ยนแปลงพฤติกรรมพึงประสงค์ไม่น้อยกว่าร้อยละ 70\" และทำผลงานจริงได้ \"ร้อยละ 77.33\" จุดสกัดคือ ต้องมีเอกสารแสดงให้ผู้ตรวจเห็นอย่างโปร่งใสว่า \"ร้อยละ 77.33 นี้ วัดผลมาจากเครื่องมืออะไร (เช่น แบบประเมินพฤติกรรม 360 องศา หรือผลประเมินรายบุคคลจากหัวหน้างาน)\" เพื่อยืนยันว่าเป็น Outcome ของจริง"],4:["การวิเคราะห์เจาะจงเฉพาะด้านนวัตกรรม: แม้ กทท. จะมีการสำรวจการรับรู้ค่านิยม SMART PAT ในภาพรวมแล้ว (พนักงานรับรู้ร้อยละ 100)  แต่ผู้ตรวจต้องการเห็นการดึงคะแนนเฉพาะตัว \"A - Agility\" ออกมาขยายผล ว่าพนักงานมีระดับความพร้อมในการรับการเปลี่ยนแปลงที่ร้อยละเท่าไหร่ (เช่น ปี 68 อยู่ที่ 85.81%) และยังขาดทักษะหรือความกล้าแสดงออกในจุดไหน เพื่อนำไปทำ Gap Analysis"],5:["Continuous Improvement: การได้ระดับ 5 ไม่ใช่แค่คะแนนสูง แต่ต้องแสดงวงจร PDCA ให้เห็น เช่น กทท. สามารถเขียนอธิบายได้ว่า \"จากผลสำรวจโครงการ PAT DNA ผู้เข้าร่วมเสนอให้ผู้บริหารลงมาเป็น Mentor ด้วยตนเอง (Feedback) กทท. จึงได้ปรับปรุงรูปแบบกิจกรรมโดยจัดรอบ Pitching ให้ผู้บริหารระดับสูงลงมาเป็นวิทยากรให้คำแนะนำ (Action) ส่งผลให้ผลงานที่เข้าประกวดตอบโจทย์องค์กรมากขึ้นและได้รับการยอมรับอย่างสูง (Result)\""]},links:[{level:1,dim:"HCM"},{level:2,dim:"HCM"},{level:3,dim:"IM 6.2 (กระบวนการประกวด/ค้นหาไอเดีย)"},{level:4,dim:"HCM"},{level:5,dim:"SP"},{level:5,dim:"HCM"}]},
"5.2":{scopeNote:"มุ่งเน้นประเมินการสร้าง \"ขีดความสามารถ (Capability)\" ของทีมงานขับเคลื่อนนวัตกรรมและพนักงาน โดยเริ่มตั้งแต่การประเมินว่าพนักงานยังขาดทักษะอะไร (Gap Analysis) นำไปสู่การจัดทำแผนพัฒนารายบุคคล (IDP) การจัดอบรม และ \"การนำความก้าวหน้าทางนวัตกรรมไปผูกกับระบบประเมินผล/ความก้าวหน้าในสายอาชีพ (Career Path)\" เพื่อรักษาคนเก่งไว้ในองค์กร",dimLevels:["การวิเคราะห์และประเมินช่องว่างความรู้ความสามารถและศักยภาพการใช้ความคิดสร้างสรรค์ (Gap Analysis) และจัดทำ/ทบทวนแผนยกระดับความรู้ความสามารถฯ ระยะยาวและประจำปี","ถ่ายทอดแผนยกระดับและพัฒนาความรู้ความสามารถและศักยภาพการใช้ความคิดสร้างสรรค์และจัดการนวัตกรรมองค์กรประจำปีแก่ผู้ที่เกี่ยวข้อง","การดำเนินการตามแผนยกระดับและพัฒนาความรู้ความสามารถฯ ได้ครบถ้วน และ \"บรรลุตามเป้าหมายของแผน\"","การยกระดับความรู้ความสามารถด้านนวัตกรรม เชื่อมโยงกับ \"ระบบแรงจูงใจและความก้าวหน้าในสายอาชีพ (Career Path)\" ของผู้รับผิดชอบด้านการจัดการนวัตกรรมขององค์กร","การใช้ข้อมูลป้อนกลับ (Feedback) เพื่อปรับปรุงการยกระดับความรู้ความสามารถด้านนวัตกรรม ให้มีผลสำเร็จดีกว่าเป้าหมาย และดีขึ้นกว่าปีที่ผ่านมา"],minReqs:{1:["คู่มือสมรรถนะองค์กร (Competency Dictionary) ที่มีการระบุทักษะด้านนวัตกรรม (Innovation Competency)","รายงานผลการประเมินช่องว่างความรู้ความสามารถ (Gap Analysis Report) ของบุคลากรรายบุคคล","แผนยกระดับและพัฒนาความรู้ความสามารถฯ (ระยะยาวและประจำปี) ที่สอดคล้องกับช่องว่างที่พบ"],2:["บันทึกแจ้งผลการประเมินสมรรถนะรายบุคคล และการแจ้งแผนพัฒนา (IDP) ให้พนักงานรับทราบ","หลักฐานการสื่อสาร/เผยแพร่แผนพัฒนาสมรรถนะการจัดการนวัตกรรมไปยังผู้บริหารและพนักงานทั่วองค์กร"],3:["รายงานผลการจัดการฝึกอบรม/การพัฒนาทักษะตามแผนประจำปี","[แก้ไข Gap สำคัญ] สรุปผลการประเมินความสำเร็จของการฝึกอบรม ที่วัดผลสำเร็จเชิงตัวเลข"],4:["ระเบียบ/คู่มือการบริหารทรัพยากรบุคคล ที่ระบุหลักเกณฑ์ความก้าวหน้าในสายอาชีพ (Career Path) สำหรับ \"กลุ่มตำแหน่งงานด้านนวัตกรรม\"","ประกาศ/เกณฑ์การพิจารณาผลตอบแทน (Incentive) โบนัส หรือการเลื่อนขั้น ที่นำ \"สมรรถนะด้านนวัตกรรม\" หรือ \"ความสำเร็จในการทำโครงการนวัตกรรม\" เข้ามาเป็นส่วนหนึ่งของการพิจารณา"],5:["รายงาน AAR / รายงานประเมินความพึงพอใจและประสิทธิภาพของหลักสูตรฝึกอบรมนวัตกรรม","ตารางเปรียบเทียบผลสมรรถนะ (Competency Score Year-over-Year): ตารางที่แสดงให้เห็นว่า สมรรถนะด้านนวัตกรรมของทีมงานในปีนี้ \"สูงกว่า\" ปีที่ผ่านมาอย่างเป็นรูปธรรม"]},subComps:{1:["ทักษะแห่งอนาคต (Future Skills / Training Need): ผู้ตรวจคอมเมนต์ชัดเจนว่า กทท. ต้องวิเคราะห์ Training Need ที่เป็นปัจจุบันและ \"สะท้อนต่อแนวโน้มการดำเนินงานของธุรกิจหลักในอนาคต\"  หมายความว่า ห้ามวิเคราะห์แค่ทักษะพื้นฐาน แต่ต้องมีรายงานที่ระบุความต้องการทักษะใหม่ๆ เช่น AI & Data Literacy, Design Thinking หรือ Strategic Foresight สำหรับทีมงานขับเคลื่อนนวัตกรรม (Core IM Team)"],2:["การสื่อสารที่สะท้อนความจำเป็น: ต้องแสดงหลักฐานให้เห็นว่า พนักงานได้รับรู้เป้าหมายและความจำเป็นว่า \"ทำไมตนเองถึงต้องถูกประเมินและต้องเข้าอบรมทักษะเหล่านี้\" ไม่ใช่แค่ส่งบันทึกแจ้งให้มาอบรมเฉยๆ"],3:["ผลผลิตและผลลัพธ์ (Output & Outcome): ผู้ตรวจระบุว่า กทท. ต้องกำหนดเป้าหมายทั้งด้านผลผลิต (Output) และ ผลลัพธ์ (Outcome) เพื่อสะท้อนการยกระดับที่ชัดเจน  กล่าวคือ ห้ามวัดแค่ \"มีคนเข้าอบรมครบ 100%\" (Output) แต่ต้องมีหลักฐานว่า \"คะแนนสอบหลังเรียน (Post-test) หรือคะแนนสมรรถนะ (Competency Score) ของทีมงานเพิ่มขึ้น\" (Outcome)"],4:["การบริหารจัดการคนเก่ง (Talent Management): นี่คือการบูรณาการขั้นสุดกับ HCM ครับ ผู้ตรวจต้องการเห็นว่า หาก กทท. มีนักนวัตกรรมที่เก่ง (เช่น กลุ่ม Core IM Team หรือผู้ชนะ PAT DNA) กทท. มีกลไกตอบแทนพวกเขาอย่างไรให้อยู่กับองค์กรต่อ (Retention) การมีหนังสือสั่งการที่นำผลงานนวัตกรรมไปผูกกับการประเมิน PMS ประจำปีคือคีย์เวิร์ดของข้อนี้"],5:["Agile Learning & Development: ต้องมีเอกสารบันทึกการทบทวนหลักสูตร เช่น \"จาก Feedback ปี 67 พบว่าบุคลากรขาดทักษะด้านการใช้ AI ในปี 68 จึงปรับปรุงหลักสูตรนำ AI เข้ามาเสริม ทำให้คะแนนสมรรถนะแห่งอนาคตเพิ่มสูงขึ้นทะลุเป้าหมาย\""]},links:[{level:1,dim:"HCM"},{level:2,dim:"HCM"},{level:3,dim:"HCM"},{level:4,dim:"HCM"},{level:5,dim:"HCM"}]},
"6.1":{scopeNote:"มุ่งเน้นประเมินการออกแบบ \"ระบบนวัตกรรมองค์กร (Corporate Innovation System: CIS)\" ซึ่งเป็นพิมพ์เขียวภาพใหญ่ขององค์กร โดยต้องมีองค์ประกอบพื้นฐานครบถ้วน ครอบคลุมทั้งนวัตกรรมที่คิดค้นเองภายใน (Closed Innovation) และการดึงเครือข่ายพันธมิตรภายนอกมาร่วมทำ (Open Innovation) รวมถึงต้องมีการจัดพอร์ตโฟลิโอ (Innovation Portfolio) และการบริหารจัดการลิขสิทธิ์/ทรัพย์สินทางปัญญา (IP) อย่างเป็นระบบ",dimLevels:["การออกแบบระบบนวัตกรรมองค์กร (CIS) ที่สอดคล้องกับบริบทขององค์กร และครอบคลุมองค์ประกอบที่สำคัญ","ระบบนวัตกรรมต้องครอบคลุม นวัตกรรมแบบเปิด (Open Innovation) การบริหารกลุ่มนวัตกรรม (Innovation Portfolio) และการจัดการทรัพย์สินทางปัญญา (Intellectual Property: IP)","การดำเนินการตามระบบนวัตกรรมองค์กร (CIS) ที่กำหนดไว้อย่างครบถ้วน และบรรลุเป้าหมาย","ระบบนวัตกรรมองค์กร มีความสอดคล้องกับ \"ระบบนิเวศทางธุรกิจ (Business Ecosystem)\" และมีการประเมินประสิทธิผลของระบบนวัตกรรมองค์กร","การใช้ข้อมูลป้อนกลับ (Feedback) จากการประเมิน มาปรับปรุงระบบนวัตกรรมองค์กร เพื่อเพิ่มประสิทธิภาพให้ดีกว่าเป้าหมายและดีกว่าปีที่ผ่านมา"],minReqs:{1:["แผนภาพ/ผังระบบนวัตกรรมองค์กร (PAT-CIS) ให้ครบทั้ง 7 ด้าน ได้แก่ บทบาทผู้บริหารระดับสูง (Leadership), ยุทธศาสตร์ (Strategy), วัฒนธรรม (Culture), บุคลากร (People), กระบวนการนวัตกรรม (Process), การจัดการความรู้และเทคโนโลยี (KM & IT) , กลไกการติดตามประเมินผล (Monitoring)","คู่มือระบบนวัตกรรมองค์กรที่อธิบายความเชื่อมโยงของแต่ละองค์ประกอบ"],2:["คู่มือ/ระเบียบการทำ Open Innovation: (เช่น เกณฑ์การคัดเลือกพันธมิตร หรือเงื่อนไขการทำ MOU นวัตกรรม)","ตารางบริหาร Innovation Portfolio: การแบ่งสัดส่วนโครงการนวัตกรรม (เช่น Core 70% / Adjacent 20% / Transformational 10%)","คู่มือ/ระเบียบการจัดการทรัพย์สินทางปัญญา (IP Policy): ระเบียบที่ระบุว่า หากพนักงานคิดค้นนวัตกรรมได้ ใครเป็นเจ้าของลิขสิทธิ์ และมีแนวทางจดสิทธิบัตรอย่างไร"],3:["รายงานผลการดำเนินงานนวัตกรรมประจำปี ที่ยืนยันว่ามีการใช้งานระบบ PAT-CIS จริง","หลักฐานเชิงประจักษ์ด้าน Open Innovation: เช่น รายงานความสำเร็จของการร่วมมือกับกรมการขนส่งทางบกในการทำแอปพลิเคชันจัดการจราจร (LCP Traffic)","หลักฐานด้าน IP: เอกสารแสดงการยื่นขอจดลิขสิทธิ์/อนุสิทธิบัตรของผลงานนวัตกรรม กทท."],4:["แผนภาพ Business Ecosystem: แผนภาพที่แสดงให้เห็นว่าระบบ PAT-CIS เชื่อมโยงกับ Stakeholder ภายนอก (เช่น รัฐบาล, คู่แข่ง, คู่ค้า, ชุมชน) อย่างไร","รายงานการประเมินประสิทธิผล (AAR / System Audit) ของการใช้ระบบ PAT-CIS"],5:["รายงานทบทวนระบบ PAT-CIS ฉบับอัปเดต","ตารางเปรียบเทียบประสิทธิภาพ (Before & After): แสดงตัวชี้วัดกระบวนการ (Process KPI) ที่ดีขึ้น"]},subComps:{1:["บังคับครบ 7 องค์ประกอบ: คู่มือ SE-AM กำหนดบังคับว่าระบบ CIS ต้องวาดและอธิบายให้ครบ 7 ด้าน ได้แก่ 1) บทบาทผู้บริหาร 2) ยุทธศาสตร์ 3) วัฒนธรรม 4) บุคลากร 5) กระบวนการนวัตกรรม 6) การจัดการความรู้และเทคโนโลยี (KM & IT) และ 7) กลไกการติดตาม หาก กทท. ขาดองค์ประกอบใดไป (เช่น ลืมใส่เรื่อง KM & IT ลงในผัง) ผู้ตรวจจะนำมาหารเป็นทศนิยมทันที"],2:["Open Innovation ไม่ใช่แค่ MOU: การทำนวัตกรรมแบบเปิด ผู้ตรวจต้องการเห็น \"กระบวนการได้มาซึ่งพันธมิตร\" ไม่ใช่แค่ส่งภาพจับมือ MOU แต่ต้องมีเกณฑ์คัดเลือกชัดเจนว่าทำไมถึงเลือกพันธมิตรรายนี้มาช่วยแก้ปัญหา","IP Management: เป็นจุดที่หลายรัฐวิสาหกิจพลาด กทท. ต้องมีเอกสาร \"ระเบียบทรัพย์สินทางปัญญาขององค์กร\" มาแสดงเป็นหลักฐานยืนยันว่าได้เตรียมระบบรองรับการจดสิทธิบัตร/อนุสิทธิบัตรไว้แล้ว"],3:["การทำตามสิ่งที่ออกแบบไว้ 100%: หากใน Level 2 มีการออกแบบโครงสร้าง IP และ Portfolio ไว้ ใน Level 3 ผู้ตรวจจะถามหา \"ผลลัพธ์ของการออกแบบนั้น\" ทันที ถ้ามีแต่ระเบียบ IP แต่ไม่มีการนำนวัตกรรมใดๆ ไปยื่นจดสิทธิบัตรเลย หรือไม่มีการแบ่ง Portfolio จริง คะแนนความสมบูรณ์ในระดับ 3 จะถูกหักออกครับ"],4:["Value Exchange (การแลกเปลี่ยนคุณค่าใน Ecosystem): ระบบนิเวศธุรกิจที่ดี ต้องแสดงให้เห็นการแลกเปลี่ยนข้อมูลและคุณค่า เช่น การแสดงให้เห็นว่า ฝ่ายนวัตกรรม (IM) ได้นำข้อมูลเสียงลูกค้าจาก ฝ่ายลูกค้า (SCM) หรือฐานข้อมูล Big Data จากฝ่าย IT (DT) เข้ามาหล่อเลี้ยงระบบ PAT-CIS เพื่อให้ผลิตนวัตกรรมที่ตอบโจทย์ตลาดได้อย่างไร"],5:["ผลลัพธ์ของการปรับระบบ (System-level Impact): การปรับปรุงต้องส่งผลต่อภาพรวม ไม่ใช่แค่ระดับโครงการ เช่น กทท. สามารถเคลมว่า \"จากการประเมินระบบ PAT-CIS (Feedback) พบว่าพนักงานขาดแรงจูงใจในการจดลิขสิทธิ์ กทท. จึงปรับปรุงระเบียบ IP ให้มีเงินรางวัลตอบแทนพิเศษ (Action) ส่งผลให้ปีนี้มีผลงานนวัตกรรมยื่นจดอนุสิทธิบัตรเพิ่มขึ้น 50% ซึ่งดีกว่าเป้าหมายและปีที่ผ่านมา (Result)\""]},links:[{level:1,dim:"HCM"},{level:1,dim:"SP"},{level:2,dim:"HCM"},{level:2,dim:"SP"},{level:3,dim:"CG"},{level:3,dim:"กองกฏหมาย"},{level:4,dim:"SP / SCM"},{level:5,dim:"KM"},{level:5,dim:"ปัญหาและอุปสรรคที่เกิดจากการนำระบบนวัตกรรม (CIS) ไปใช้งานจริง"}]},
"6.2":{scopeNote:"มุ่งเน้นประเมินความสามารถขององค์กรในช่วง \"ต้นน้ำ\" ของนวัตกรรม (Front End Innovation) ครอบคลุมตั้งแต่การกระตุ้นให้เกิดความคิดสร้างสรรค์ (Idea Generation) การกลั่นกรองและประเมินแนวคิด (Idea Screening and Evaluation)  ไปจนถึงการตัดสินใจคัดเลือกไอเดียที่สอดคล้องกับทิศทางธุรกิจเพื่อส่งต่อไปยังขั้นตอนการพัฒนาต่อไป",dimLevels:["การกำหนดกระบวนการใช้ความคิดสร้างสรรค์สู่การสร้างนวัตกรรมในช่วงแรก (Front End Innovation) อย่างเป็นระบบ ครอบคลุมตั้งแต่การสร้างสรรค์แนวคิด การกลั่นกรอง และการประเมิน","การดำเนินการตามกระบวนการพัฒนานวัตกรรมในช่วงแรก (Front End) โดยบุคลากรทุกระดับมีส่วนร่วม และมีการพิจารณาถึงการประยุกต์ใช้เทคโนโลยีดิจิทัล","ดำเนินการตามกระบวนการอย่างเป็นระบบ และ \"บรรลุผลสำเร็จตามเป้าหมาย\" ที่กำหนดไว้ในแผนงานประจำปี","การคัดเลือกและพัฒนานวัตกรรม \"สอดคล้องกับทิศทางการดำเนินธุรกิจขององค์กร\"","การประเมินและปรับปรุงกระบวนการใช้ความคิดสร้างสรรค์สู่การสร้างนวัตกรรม เพื่อให้มีผลสำเร็จที่ดีกว่าเป้าหมายและดีกว่าปีที่ผ่านมา"],minReqs:{1:["ผังกระบวนการ (SIPOC / Flowchart) แสดงขั้นตอนการรับไอเดียและการคัดกรอง","คู่มือ/เกณฑ์การคัดกรองไอเดีย (Idea Screening Criteria): เช่น เกณฑ์การตัดสินโครงการ PAT DNA ที่ระบุน้ำหนักคะแนนชัดเจน"],2:["รายงานสรุปการจัดกิจกรรมสร้างสรรค์ไอเดีย (เช่น รายงานผลการจัดกิจกรรม PAT DNA ที่รวบรวมแนวคิดได้ 46 โครงการ)","ภาพถ่ายกิจกรรมหรือหลักฐานที่แสดงให้เห็นว่า \"บุคลากรทุกระดับ/ทุกสายงาน\" มีส่วนร่วมในการส่งไอเดีย"],3:["รายงานผลการประเมินและคัดกรองแนวคิด (Idea Evaluation Report) (เช่น มติของคณะทำงานต่อยอดฯ ในการคัดเลือกไอเดีย)","ตารางเปรียบเทียบผลลัพธ์กับเป้าหมาย (KPI Dashboard): เช่น เป้าหมายตั้งไว้ว่าต้องได้ 30 ไอเดีย แต่ทำได้ 46 ไอเดีย (บรรลุเป้าหมาย 100%)"],4:["ตารางความสอดคล้อง (Alignment Matrix): เอกสารที่นำไอเดีย/โครงการที่ผ่านการคัดเลือก มาจับคู่ (Mapping) กับยุทธศาสตร์องค์กร หรือปัญหาของลูกค้า (Unmet Need)"],5:["รายงานถอดบทเรียน (AAR) หรือรายงานการประเมินประสิทธิภาพของ \"กระบวนการจัดประกวดและคัดเลือกแนวคิด\"","[แก้ไข Gap สำคัญ] เอกสารติดตามปัญหาและแนวทางปรับปรุง: บันทึกการแก้ไขปัญหาอุปสรรคที่เกิดจากกระบวนการคัดกรอง"]},subComps:{1:["ผู้มีอำนาจตัดสินใจในแต่ละจุด (Decision Maker): ผู้ตรวจต้องการเห็นว่า ในการคัดกรองไอเดียแต่ละรอบ (Stage-Gate) ใครคือผู้มีอำนาจอนุมัติให้ไอเดียนั้นผ่านเข้ารอบต่อไป (เช่น คณะทำงานต่อยอดนวัตกรรม หรือ คณะกรรมการระดับองค์กร)"],2:["Digital Tools for Idea Generation: เพื่อให้ได้คะแนนความสมบูรณ์ในระดับนี้ กทท. ควรแสดงหลักฐานการใช้ \"แพลตฟอร์มดิจิทัล\" ในการรับส่งหรือโหวตไอเดีย เช่น การสร้าง e-Form รับข้อเสนอแนะ หรือหน้า Web Portal สำหรับรวบรวมไอเดียนวัตกรรม เพื่อตอบโจทย์มิติการประยุกต์ใช้เทคโนโลยีดิจิทัล"],3:["คุณภาพของไอเดียที่ผ่านเข้ารอบ: ผู้ตรวจไม่ได้ดูแค่จำนวน แต่ต้องการเห็นว่าไอเดียที่ผ่านการกลั่นกรองนั้น \"พร้อมที่จะถูกส่งต่อไปยังขั้นตอนการพัฒนา (Development)\" ในข้อ 6.3 หรือไม่"],4:["Business Alignment: ไอเดียที่ชนะเลิศต้องไม่ใช่แค่นวัตกรรมทั่วไป แต่ต้องตอบโจทย์ Core Business ขององค์กร เช่น การที่ กทท. คัดเลือก \"แอปพลิเคชัน LCP Traffic (แก้ปัญหารถติดแหลมฉบัง)\" ถือเป็นหลักฐานชั้นดีที่แสดงให้เห็นว่าการคัดเลือกไอเดียสอดคล้องกับปัญหาหลักและทิศทางธุรกิจของท่าเรือ"],5:["Tracking the \"Process\" Issues: ในปี 68 กทท. ถูกผู้ตรวจคอมเมนต์ชัดเจนว่ายังมีช่องโหว่เรื่อง \"การติดตามปัญหาและอุปสรรคจากการนำกระบวนการนวัตกรรมไปปฏิบัติจริง\"  ดังนั้น ในระดับ 5 นี้ กทท. ต้องไม่ทำแค่รายงานสรุปผู้ชนะ PAT DNA แต่ต้องมีการประชุมสรุปว่า เกณฑ์คัดเลือกปีนี้มีปัญหาอะไร? คนส่งงานน้อยเพราะอะไร? แล้วปรับเกณฑ์หรือระบบงานใหม่สำหรับปี 69 อย่างไรให้ดีขึ้น?  การมีเอกสารบันทึกการปรับปรุงระบบงานนี้คือคีย์หลักในการคว้าคะแนนเต็ม"]},links:[{level:1,dim:"SCM"},{level:2,dim:"RM&IC"},{level:3,dim:"SP"},{level:4,dim:"SP"},{level:5,dim:"KM"}]},
"6.3":{scopeNote:"มุ่งเน้นประเมิน \"การลงมือสร้างนวัตกรรม\" (Development phase) โดยใช้วิธีการบริหารโครงการอย่างเป็นระบบ (เช่น Stage-Gate Model) ตั้งแต่การทำเครื่องมือต้นแบบ (Prototype), การทดสอบ (Testing), การนำเทคโนโลยีดิจิทัลมาประยุกต์ใช้ ไปจนถึงการปล่อยผลงานออกสู่การใช้งานจริง (Launch) ที่ตอบโจทย์ทิศทางธุรกิจขององค์กร",dimLevels:["การกำหนดกระบวนการพัฒนานวัตกรรมขององค์กรอย่างเป็นระบบ","การดำเนินการตามกระบวนการพัฒนานวัตกรรมในรูปแบบต่าง ๆ ตามแผนงาน และพิจารณาถึงการ \"ประยุกต์ใช้เทคโนโลยีดิจิทัล\"","การดำเนินการตามกระบวนการพัฒนานวัตกรรมอย่างเป็นระบบ และ \"บรรลุผลสำเร็จตามเป้าหมาย\" ที่กำหนดไว้ในแผนงานประจำปี","การพัฒนานวัตกรรม \"สอดคล้องกับทิศทางการดำเนินธุรกิจ\" ขององค์กร","รัฐวิสาหกิจ \"ปรับปรุง\" การพัฒนานวัตกรรมสู่การปฏิบัติ เพื่อเพิ่มประสิทธิภาพด้านการจัดการนวัตกรรมให้มี \"ผลสำเร็จที่ดีกว่าเป้าหมายและดีกว่าปีที่ผ่านมา\""],minReqs:{1:["คู่มือ/ผังกระบวนการพัฒนานวัตกรรม ที่ระบุขั้นตอนชัดเจนตั้งแต่เริ่มพัฒนาจนถึงนำไปใช้งานจริง (เช่น PAT Stage-Gate 5 ขั้นตอน)"],2:["รายงานความคืบหน้าการพัฒนานวัตกรรมที่แสดงให้เห็นว่ามีการใช้ระบบดิจิทัลเข้ามาช่วย (เช่น การพัฒนาแอป LCP Traffic)"],3:["รายงานสรุปผลการดำเนินงานโครงการนวัตกรรม (Project Dashboard)","ตารางเปรียบเทียบผลผลิต (Output KPI): เช่น ปีนี้ตั้งเป้าพัฒนานวัตกรรมให้แล้วเสร็จ 5 โครงการ ก็ต้องมีหลักฐานว่าทำสำเร็จผ่าน Gate สุดท้ายและนำไปใช้งานจริง (Launch) ได้ครบ 5 โครงการ"],4:["ตารางแสดงความสอดคล้อง (Alignment Matrix) ของโครงการนวัตกรรมที่พัฒนาสำเร็จ กับ Core Business หรือยุทธศาสตร์องค์กร"],5:["รายงานถอดบทเรียน (AAR) ถึงปัญหาความล่าช้าในกระบวนการพัฒนานวัตกรรม (Stage-Gate)","เอกสารหลักฐานการปรับปรุงกระบวนการ (Process Improvement)"]},subComps:{1:["Stage-Gate Model: คู่มือ SE-AM ระบุไว้ในหมายเหตุเลยว่าองค์กรควรมีกระบวนการพัฒนานวัตกรรมเช่น Stage-gate model กทท. ควรนำ Best Practice ของ รฟม. มาปรับใช้ โดยแสดงผัง Stage-Gate ควบคู่ไปกับแผนปฏิบัติการให้ชัดเจน"],2:["บังคับครอบคลุม 2 ประเภท (The Hidden Trap): คู่มือ SE-AM หน้า 7-31 หมายเหตุระบุบังคับไว้ชัดเจนว่า \"การพัฒนานวัตกรรมตามเกณฑ์ระดับ 2 อย่างน้อยต้องครอบคลุมการพัฒนานวัตกรรมผลิตภัณฑ์และบริการ (Product/Service Innovation) และ การพัฒนานวัตกรรมกระบวนการ (Process Innovation)\" หาก กทท. ส่งประกวดแค่แอปพลิเคชัน (บริการ) แต่ไม่มีผลงานนวัตกรรมด้านกระบวนการทำงานภายในเลย คะแนนระดับนี้จะโดนหักทอนเป็นทศนิยมทันที"],3:["ข้ามผ่านหุบเหวแห่งความตาย (Valley of Death): ผู้ตรวจไม่ต้องการเห็นแค่ \"เครื่องมือต้นแบบ (Prototype)\" ที่ทำเสร็จแล้วเก็บเข้าตู้ แต่ต้องการหลักฐานว่าผลงานนั้น \"ถูกนำออกไปใช้งานจริง (Launch/Commercialization)\" ในพื้นที่แล้ว"],4:["แก้ปัญหาหลักขององค์กร (Core Business Solution): โครงการนวัตกรรมที่นำมาโชว์ต้องเป็นสิ่งที่ส่งผลกระทบต่อธุรกิจหลักโดยตรง (เช่น แอป LCP Traffic ที่ช่วยแก้ปัญหารถติดในท่าเรือแหลมฉบัง ถือเป็นตัวอย่างที่ตรงเป้าและสอดคล้องกับทิศทางธุรกิจอย่างมาก)"],5:["Time-to-Market ที่เร็วขึ้น: การพิสูจน์ว่ากระบวนการดีขึ้น ผู้ตรวจต้องการเห็นตัวเลขเวลาที่ลดลง เช่น \"จากการทำ AAR พบว่าการอนุมัติโครงการล่าช้า (Before) กทท. จึงปรับปรุงรอบการประชุม Stage-Gate ให้กระชับขึ้น ส่งผลให้ระยะเวลาเฉลี่ยในการพัฒนานวัตกรรมจนออกสู่การใช้งานจริง (Time-to-Market) เร็วขึ้นกว่าปีที่ผ่านมา 20% (After)\""]},links:[{level:1,dim:"นำกระบวนการ Stage-Gate 5 ขั้นตอน (ที่ออกแบบไว้ใน IM 6.1) มาเป็นมาตรฐานบังคับใช้กับทุกโครงการ"},{level:2,dim:"DT"},{level:2,dim:"SP"},{level:3,dim:"SP"},{level:3,dim:"SCM"},{level:4,dim:"SP"},{level:4,dim:"SCM"},{level:4,dim:"ดึงงบประมาณจาก IM 2.2 มาใช้พัฒนางาน และส่งผลลัพธ์ที่ได้ไปตอบโจทย์ตัวชี้วัดใน IM 7.1"},{level:5,dim:"RM&IC"},{level:5,dim:"KM"}]},
"7.1":{scopeNote:"มุ่งเน้นประเมิน \"ผลสัมฤทธิ์\" ของการทำนวัตกรรม โดยบังคับว่าต้องกางตัวชี้วัด (KPI) ให้ครบ 4 มิติ ตามหลัก Balanced Scorecard (BSC) และต้องพิสูจน์ด้วยตัวเลขให้ได้ว่า ผลงานนวัตกรรมของ กทท. นั้น ดีกว่าเป้าหมาย ดีกว่าปีที่ผ่านมา และดีกว่าคู่เทียบระดับโลก",dimLevels:["รัฐวิสาหกิจมีการกำหนดตัวชี้วัดและเป้าหมายที่มี \"ความท้าทาย\"","รัฐวิสาหกิจมีผลสำเร็จตามตัวชี้วัดทุกด้าน \"ไม่เป็นไปตามเป้าหมาย\" ประจำปีที่กำหนด","รัฐวิสาหกิจมีผลสำเร็จตามตัวชี้วัดทุกด้าน \"เป็นไปตามเป้าหมาย\" ประจำปีที่กำหนด","รัฐวิสาหกิจมีผลสำเร็จตามตัวชี้วัดทุกด้าน \"ดีกว่าเป้าหมายประจำปีที่กำหนดต่อเนื่อง 3 ปี ติดต่อกัน\" และ/หรือ สามารถเทียบเคียงกับคู่แข่ง/คู่เทียบได้","ทบทวน และวิเคราะห์ประสิทธิภาพประสิทธิผล จัดเก็บในระบบดิจิทัล และปรับปรุงพัฒนาระบบอย่างเป็นรูปธรรม"],minReqs:{1:["ตารางสรุปตัวชี้วัด (KPI) ด้านนวัตกรรมขององค์กร ที่มีค่าเป้าหมายชัดเจน เน้น 4 มิติหลัก ได้แก่ มิติด้านการเงิน (Financial: F), มิติด้านลูกค้าและผลิตภัณฑ์/บริการ (Customer: C), มิติด้านกระบวนการภายใน (Internal Process: P) และ มิติด้านการเรียนรู้และการพัฒนา (Learning and Growth: L)"],2:["รายงานผลการดำเนินงานด้านนวัตกรรมประจำปี (แสดง Actual vs Target) เน้น 4 มิติหลักเหมือนเดิม"],3:["Dashboard / ตารางรายงานผลสัมฤทธิ์นวัตกรรม: ที่โชว์แถบสีเขียว (ผ่านเกณฑ์) ในทุกตัวชี้วัด (เน้น 4 มิติหลักเหมือนเดิม)"],4:["ตารางเปรียบเทียบผลลัพธ์ 3 ปี (Trend Analysis): ย้อนหลังปี 66, 67, 68","[แก้ไข Gap สำคัญ] ตารางเปรียบเทียบคู่เทียบ (Benchmarking Report): ที่นำผลลัพธ์นวัตกรรมไปเทียบกับท่าเรืออื่น"],5:["รายงาน AAR ถอดบทเรียนจากการตั้ง KPI นวัตกรรม","หน้าจอการจัดเก็บผลลัพธ์ลงในระบบฐานข้อมูลดิจิทัล (PAT-CIS / KM Portal)"]},subComps:{1:["กฎเหล็ก 4 มิติ BSC: คู่มือ SE-AM บังคับไว้ชัดเจนว่าตัวชี้วัดต้องครอบคลุม 4 ด้าน ได้แก่ 1) ด้านการเงิน (เช่น รายได้จากนวัตกรรม) 2) ด้านลูกค้า (เช่น ความพึงพอใจต่อนวัตกรรม) 3) ด้านกระบวนการภายใน (เช่น ลดเวลาทำงาน) และ 4) ด้านการเรียนรู้และพัฒนา (เช่น สัดส่วนพนักงานที่ส่งไอเดีย) หากส่งตาราง KPI ที่มีแต่มิติการเงิน จะโดนปัดตกทันที","Output vs Outcome: เป้าหมายต้องมีทั้งผลผลิต (เช่น ได้แอปพลิเคชัน 1 ตัว) และ ผลลัพธ์ (เช่น แอปพลิเคชันช่วยลดเวลารถติดได้กี่นาที)"],2:["ความโปร่งใสของข้อมูล: แม้ผลงานบางตัวจะไม่ถึงเป้า แต่การรายงานผลตามความเป็นจริงครบทั้ง 4 มิติ BSC คือเงื่อนไขในการได้คะแนนระดับนี้"],3:["การเคลมผลงาน (Claiming Success): กทท. มีของดีอยู่แล้ว คือ นวัตกรรมบริการ Free Zone ที่ทำรายได้ 11.54 ล้านบาท (เป้า 10 ล้าน) และระบบ E-Complaint ที่ลดขั้นตอนได้ 66.67% และต้องนำผลลัพธ์ 2 ตัวนี้มาใส่ในตาราง BSC ให้ชัดเจน (Free Zone ใส่ช่องการเงิน / E-Complaint ใส่ช่องกระบวนการภายใน) เพื่อยืนยันว่าเราบรรลุเป้า 100%"],4:["คู่เทียบต้องท้าทาย (Challenging Benchmark): ผู้ตรวจคอมเมนต์ชัดเจนว่า กทท. ต้องเทียบกับคู่เทียบที่ท้าทาย ดังนั้น ในรายงานต้องดึงตัวเลข \"ท่าเรือสิงคโปร์ (PSA) หรือท่าเรือมาเลเซีย\" มาเทียบ เช่น \"นวัตกรรมแอป LCP Traffic ช่วยให้ Truck Turnaround Time ของ กทท. ดีกว่าค่าเฉลี่ยของท่าเรือในภูมิภาคอาเซียน\" การเขียนเชิงเปรียบเทียบแบบนี้คือหัวใจของ Level 4"],5:["System-Level Impact: ต้องแสดงให้เห็นว่า กทท. ได้นำผลการดำเนินงานที่อาจพลาดเป้า ไปวิเคราะห์หาสาเหตุ และทำการ \"ปรับเปลี่ยนเป้าหมายหรือกลยุทธ์ในปีถัดไป\" ให้สะท้อนความสามารถเชิงแข่งขันที่แท้จริง"]},links:[{level:1,dim:"SP"},{level:1,dim:"HCM"},{level:2,dim:"IM 6.3"},{level:2,dim:"CG / ผู้บริหารระดับสูง"},{level:3,dim:"IM 6.3"},{level:3,dim:"CG / ผู้บริหารระดับสูง"},{level:4,dim:"SP"},{level:5,dim:"DT"},{level:5,dim:"KM"}]}};

var im=DATA.im.subs;
function h(id){return im.find(function(s){return String(s.id)===String(id);});}

Object.keys(D).forEach(function(id){
  var s=h(id); if(!s) return;
  var d=D[id];
  s.scopeNote=d.scopeNote; s.dimLevels=d.dimLevels;
  s.minReqs=d.minReqs; s.subComps=d.subComps||{}; s.links=d.links||[];
});
})();

// ─── IM STATE ────────────────────────────────────────
var imState={};
DATA.im.subs.forEach(function(s){
  imState[s.id]={minReqChecked:{},subCompChecked:{},dimMult:{}};
  for(var L=1;L<=5;L++){
    imState[s.id].minReqChecked[L]=(s.minReqs&&s.minReqs[L]?s.minReqs[L].map(function(){return false;}):[]);
    imState[s.id].subCompChecked[L]=(s.subComps&&s.subComps[L]?s.subComps[L].map(function(){return false;}):[]);
    imState[s.id].dimMult[L]=0;
  }
});

function imCalcLevel(id,L){
  var s=DATA.im.subs.find(function(x){return x.id===id;});
  if(!s||!s.minReqs) return 0;
  var st=imState[id];
  var mrs=s.minReqs[L]||[];
  var passedMR=mrs.length===0||mrs.every(function(_,i){return st.minReqChecked[L][i];});
  if(!passedMR) return 0;
  if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
    var chk=(st.subCompChecked[L]||[]).filter(Boolean).length;
    return chk/s.subComps[L].length;
  }
  return st.dimMult[L]||0;
}
function imCalcRaw(id){
  var raw=0,stopped=false;
  for(var L=1;L<=5;L++){
    if(stopped) continue;
    var ls=imCalcLevel(id,L);
    raw+=ls;
    if(ls===0) stopped=true;
  }
  return raw;
}
function imUpdateTarget(id){
  var s=DATA.im.subs.find(function(x){return x.id===id;});
  targets.im[id]=imCalcRaw(id)||s.s68;
}
function imToggleMR(id,L,ri,val){
  imState[id].minReqChecked[L][ri]=val;
  imUpdateTarget(id);
  if(curDim==='im'&&focusId===id) renderAll(); else updateScores();
}
function imToggleSC(id,L,si,val){
  if(!imState[id].subCompChecked[L]) imState[id].subCompChecked[L]=[];
  imState[id].subCompChecked[L][si]=val;
  imUpdateTarget(id);
  if(curDim==='im'&&focusId===id) renderAll(); else updateScores();
}
function imSetDim(id,L,val){
  imState[id].dimMult[L]=parseFloat(val);
  imUpdateTarget(id);
  if(curDim==='im'&&focusId===id) renderAll(); else updateScores();
}
function imGoToSub(subId){
  if(curDim!=='im') switchDim('im');
  focusId=subId; renderAll();
  setTimeout(function(){
    var el=document.getElementById('subrow-'+subId);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
}
function imColorSubTarget(id){
  var raw=imCalcRaw(id);
  var stDiv=document.getElementById('st-'+id);
  var inp=document.getElementById('ti-'+id);
  if(!stDiv||!inp) return;
  var bg='',color='';
  if(raw>=5.0){bg='#1B7B50';color='#fff';}
  else if(raw>=4.0){bg='#51BF8E';color='#0D3D26';}
  else if(raw>=3.0){bg='#F8BD21';color='#4A3200';}
  else if(raw>=2.0){bg='#FF6766';color='#fff';}
  else if(raw>0){bg='#FFACAB';color='#7A1010';}
  stDiv.style.background=bg;
  stDiv.style.borderLeftColor=bg||'#d4d0c8';
  inp.style.background='transparent'; inp.style.color=color||'#1E293B';
  inp.style.fontWeight=bg?'700':''; inp.style.border=bg?'none':'';
  var dot=document.getElementById('dot-'+id);
  if(dot) dot.style.display='none';
}

function _imIsInternal(dim){
  return /^IM\s*[\d.]+/.test(dim)||/^IM[\d]+/.test(dim)||/\(IM\s*[\d.]+\)/.test(dim);
}
function _imExtractId(dim){
  var m=dim.match(/IM\s*([\d]+\.[\d]+)/)||dim.match(/IM([\d]+\.[\d]+)/);
  return m?m[1]:null;
}
function _imIsDescriptive(dim){ return dim.length>40; }

function renderIMSimulator(s){
  var id=s.id, st=imState[id];
  var lvlScores=[]; var stopped=false;
  for(var L=1;L<=5;L++){
    if(stopped){lvlScores.push({score:0,blocked:true,passedMR:false});continue;}
    var mrs=(s.minReqs&&s.minReqs[L])?s.minReqs[L]:[];
    var passedMR=mrs.length===0||mrs.every(function(_,i){return st.minReqChecked[L][i];});
    var mult=0;
    if(passedMR){
      if(s.subComps&&s.subComps[L]&&s.subComps[L].length>0){
        var chk=(st.subCompChecked[L]||[]).filter(Boolean).length;
        mult=chk/s.subComps[L].length;
      } else { mult=st.dimMult[L]||0; }
    }
    var score=passedMR?mult:0;
    lvlScores.push({score:score,blocked:false,passedMR:passedMR,mult:mult});
    if(score===0) stopped=true;
  }
  var rawTotal=lvlScores.reduce(function(a,x){return a+x.score;},0);
  var wtScore=rawTotal*(s.w/100);
  var linkMap={};
  (s.links||[]).forEach(function(l){
    if(!linkMap[l.level]) linkMap[l.level]=[];
    linkMap[l.level].push(l.dim);
  });

  var lvlHTML='';
  lvlScores.forEach(function(ls,i){
    var L=i+1;
    var dl=(s.dimLevels&&s.dimLevels[L-1])||'';
    var mrs=(s.minReqs&&s.minReqs[L])?s.minReqs[L]:[];
    var scs=(s.subComps&&s.subComps[L]&&s.subComps[L].length>0)?s.subComps[L]:null;

    // ── Key Takeaway จาก KT_MAP ──
    var ktArr=KT_MAP[id];
    var ktText=ktArr?ktArr[L-1]:'';

    var lvlBg=ls.blocked?'#b0bec5':ls.score>=1?'#51BF8E':ls.score>0?'#F8BD21':'#FF6766';
    var lvlClr=ls.blocked?'#546e7a':ls.score>=1?'#0D3D26':ls.score>0?'#4A3200':'#fff';
    var hdBg=ls.blocked?'#f4f0e8':ls.score>=1?'#e6f8f1':ls.score>0?'#fef9e7':'#fff0ee';
    var passTag=ls.blocked
      ?'<span class="sm-lvl-pass sm-skip">ล็อค</span>'
      :ls.score>=1
        ?'<span class="sm-lvl-pass" style="background:#51BF8E;color:#0D3D26;font-weight:700;">✓ ผ่าน</span>'
        :ls.score>0
          ?'<span class="sm-lvl-pass" style="background:#F8BD21;color:#4A3200;font-weight:700;">◐ บางส่วน</span>'
          :'<span class="sm-lvl-pass" style="background:#FF6766;color:#fff;font-weight:700;">✗ ไม่ผ่าน</span>';
    var sClr=ls.blocked?'#9ca3af':ls.score>=1?'#0D3D26':ls.score>0?'#4A3200':'#c0392b';

    // Links
    var lb='';
    (linkMap[L]||[]).forEach(function(dim){
      if(_imIsDescriptive(dim)) return;
      if(_imIsInternal(dim)){
        var sid=_imExtractId(dim);
        var lbl=sid?('IM '+sid):dim.substring(0,16);
        var oc=sid?("imGoToSub('"+sid+"')"):'';
        lb+='<span class="im-int-link" onclick="'+oc+'">🔁 '+lbl+'</span>';
      } else {
        lb+='<a href="https://pdee-hub.github.io/Enablers-Link-Document-69/" target="_blank" class="im-ext-link">🔗 '+dim+'</a>';
      }
    });

    // Min req
    var mrH='';
    if(mrs.length>0){
      mrH='<div class="sm-sect-lbl" style="color:#2a1060;background:#ede8f8;">🔒 Minimum Requirement (L'+L+')</div>';
      mrs.forEach(function(txt,ri){
        var chk=st.minReqChecked[L][ri]?'checked':'';
        mrH+='<div class="sm-req-item"><input type="checkbox" class="im-cb" id="immr-'+id+'-'+L+'-'+ri+'" '+chk+' onchange="imToggleMR(\''+id+'\','+L+','+ri+',this.checked)"><label for="immr-'+id+'-'+L+'-'+ri+'">'+txt+'</label></div>';
      });
    }

    // Dim
    var dmH='<div class="sm-sect-lbl" style="color:#2a1060;background:#ede8f8;">📐 มิติการประเมิน (Dimension Multiplier)</div>';
    if(dl) dmH+='<div style="font-size:10px;color:#334155;margin-bottom:6px;line-height:1.5;">'+dl+'</div>';
    if(scs){
      dmH+='<div class="im-sc-note">เพื่อความครบถ้วนของมิติข้างต้น โปรดตรวจสอบหลักฐานต่อไปนี้:</div>';
      scs.forEach(function(txt,si){
        var chk=(st.subCompChecked[L]||[])[si]?'checked':'';
        dmH+='<div class="sm-req-item"><input type="checkbox" class="im-cb" id="imsc-'+id+'-'+L+'-'+si+'" '+chk+' onchange="imToggleSC(\''+id+'\','+L+','+si+',this.checked)"><label for="imsc-'+id+'-'+L+'-'+si+'">'+txt+'</label></div>';
      });
      var fc=(st.subCompChecked[L]||[]).filter(Boolean).length;
      dmH+='<div style="font-size:10px;color:#555;margin-top:3px;">✓ '+fc+'/'+scs.length+' = <strong>'+(scs.length?fc/scs.length:0).toFixed(4)+'</strong></div>';
    } else {
      var cv=st.dimMult[L]||0;
      dmH+='<div class="sm-radio-grp">';
      [[0,'0 — ไม่ผ่าน'],[0.5,'0.5 — บางส่วน'],[1,'1.0 — สมบูรณ์']].forEach(function(pair){
        var chk=cv===pair[0]?'checked':'';
        dmH+='<label><input type="radio" name="imdim-'+id+'-'+L+'" value="'+pair[0]+'" '+chk+' onchange="imSetDim(\''+id+'\','+L+','+pair[0]+')"> '+pair[1]+'</label>';
      });
      dmH+='</div>';
    }

    // ── ใช้ ktText แทน kt(dl) และเพิ่ม id ให้ปุ่ม ▼ ──
    lvlHTML+='<div class="sm-lvl-row'+(ls.blocked?' blocked':'')+'"><div class="sm-lvl-hd" style="background:'+hdBg+';"><span class="sm-lvl-num" style="background:'+lvlBg+';color:'+lvlClr+';">L'+L+'</span><span class="sm-lvl-desc"><span class="lvl-kt">'+ktText+'</span>'+(dl?'<button class="lvl-toggle" id="lvlbtn-'+id+'-'+L+'" onclick="event.stopPropagation();toggleLvlDetail(\''+id+'\','+L+')">▼</button>':'')+'</span><span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">'+lb+passTag+'<span style="font-size:11px;font-weight:700;color:'+sClr+';">'+ls.score.toFixed(4)+'</span></span></div>'+(dl?'<div class="sm-lvl-detail" id="lvld-'+id+'-'+L+'">'+dl+'</div>':'')+'<div class="sm-lvl-body">'+mrH+dmH+'</div></div>';
  });

  return '<div class="sm-sim"><div class="sm-sim-hd"><span style="font-size:11px;padding:2px 8px;border-radius:6px;background:#6a3ab0;color:#f0ebfc;">Sim</span> Target Score Simulator — Sequential Gating</div><div class="sm-scope-box" style="border-left-color:#6a3ab0;">'+(s.scopeNote||'')+'</div>'+lvlHTML+'<div class="sm-total-bar"><span class="sm-total-lbl">คะแนนดิบสะสม (0–5)</span><span class="sm-raw">'+rawTotal.toFixed(4)+'</span><span class="sm-wt">× '+s.w+'% = <strong>'+wtScore.toFixed(4)+' pts</strong></span></div></div>';
}

// ─── OVERRIDES ────────────────────────────────────────
var _calcTotal_im=calcTotal;
calcTotal=function(){
  var tw=subs().reduce(function(a,s){return a+s.w;},0);
  if(curDim==='im'){
    return subs().reduce(function(a,s){return a+s.w/tw*imCalcRaw(s.id);},0);
  }
  return _calcTotal_im();
};

var _updateScores_im=updateScores;
updateScores=function(){
  _updateScores_im();
  if(curDim==='im'){
    DATA.im.subs.forEach(function(s){
      imUpdateTarget(s.id);
      var inp=document.getElementById('ti-'+s.id);
      var stEl=document.getElementById('st-'+s.id);var lbl=stEl?stEl.querySelector('.target-lbl'):null;
      if(inp){inp.value=fmt(imCalcRaw(s.id));inp.readOnly=true;}
      if(lbl) lbl.textContent='คำนวณ';
      imColorSubTarget(s.id);
    });
  }
};

var _renderLeft_im=renderLeft;
renderLeft=function(){
  _renderLeft_im();
  if(curDim==='im'){
    DATA.im.subs.forEach(function(s){
      var inp=document.getElementById('ti-'+s.id);
      var stEl=document.getElementById('st-'+s.id);var lbl=stEl?stEl.querySelector('.target-lbl'):null;
      if(inp){inp.value=fmt(imCalcRaw(s.id));inp.readOnly=true;}
      if(lbl) lbl.textContent='คำนวณ';
      imColorSubTarget(s.id);
    });
  }
};

var _renderRight_im=renderRight;
renderRight=function(){
  if(curDim!=='im'){_renderRight_im();return;}
  var body=document.getElementById('rightBody');
  if(!focusId){
    body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:13px;">คลิก sub-item ด้านซ้ายเพื่อดูรายละเอียด</div>';
    return;
  }
  var s=DATA.im.subs.find(function(x){return x.id===focusId;});
  if(!s){body.innerHTML='';return;}
  var tval=imCalcRaw(s.id);
  var simHTML=s.minReqs?renderIMSimulator(s):'';
  var gH=(s.gaps||[]).map(function(g){return '<div class="box box-red" style="margin-bottom:6px;">• '+g+'</div>';}).join('');
  var bH=(s.bp||[]).map(function(b){return '<div class="box box-teal" style="margin-bottom:5px;">'+b+'</div>';}).join('');
  var rH=(s.results||[]).map(function(r){return '<div class="match-row m-ok"><span>✓</span><span>'+r+'</span></div>';}).join('');
  var lH=(s.gaps||[]).slice(0,3).map(function(g){return '<div class="match-row m-no"><span>✗</span><span>'+g.split(':')[0]+'</span><span class="m-lvl" style="background:#fcd0cc;color:#7a1010;">Gap</span></div>';}).join('');
  var dH=(s.docs||[]).map(function(d){return '<div class="doc-row"><div class="doc-dot doc-new"></div><span style="flex:1;">'+d+'</span><span class="doc-status" style="background:#c0d0e8;color:#102848;">ต้องทำ</span></div>';}).join('');
  var eH=s.statusNote
    ?'<div style="background:#f5f0fc;border-left:3px solid #c4b0e8;border-radius:0 5px 5px 0;padding:7px 10px;font-size:11px;line-height:1.6;color:#333;">'+s.statusNote+'</div>'
    :'<div style="color:#bbb;font-size:11px;font-style:italic;">ยังไม่มีข้อมูล</div>';
  body.innerHTML=
    '<div style="padding:6px 12px;font-size:11px;background:#edeae0;border-bottom:1px solid #d4d0c8;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:2;">'
    +'<span style="font-weight:700;color:#1c2b3a;">ข้อ '+s.id+'</span><span style="color:#555;">'+s.name+'</span>'
    +'<span style="margin-left:auto;font-size:10px;background:#e0ddd4;color:#444;padding:1px 7px;border-radius:8px;">ปัจจุบัน '+fmt(s.s68)+'</span>'
    +'<span style="font-size:10px;">→</span>'
    +'<span style="font-size:10px;background:#c5e8d5;color:#0a4a2a;padding:1px 7px;border-radius:8px;font-weight:700;">คำนวณ '+fmt(tval)+'</span></div>'
    +simHTML
    +'<div class="frame"><div class="frame-hd fa-hd"><span class="ftag fa-tag">A</span><span style="color:#7a1010;">TRIS ต้องการ — ช่องว่างที่ต้องปิด</span></div><div class="frame-bd">'+(gH||'<div style="color:#999;">—</div>')+'</div></div>'
    +'<div class="frame"><div class="frame-hd fb-hd"><span class="ftag fb-tag">B</span><span style="color:#0a4a20;">หน่วยงานอื่นทำอะไรในข้อนี้ (Best Practice)</span></div><div class="frame-bd">'+(bH||'<div style="color:#999;">—</div>')+'</div></div>'
    +'<div class="frame"><div class="frame-hd fc-hd"><span class="ftag fc-tag">C</span><span style="color:#4a4a00;">กทท. ตอบอะไรไป</span></div><div class="frame-bd"><div class="box box-gray" style="margin-bottom:8px;">'+((s.good&&s.good[0])||'—')+'</div><div style="font-size:10px;color:#888;margin-bottom:4px;font-weight:600;">ผลการดำเนินงานที่นำเสนอ:</div>'+rH+'<div style="font-size:10px;color:#888;margin:8px 0 4px;font-weight:600;">ช่องว่างที่ยังขาด:</div>'+lH+'</div></div>'
    +'<div class="frame"><div class="frame-hd fd-hd"><span class="ftag fd-tag">D</span><span style="color:#102848;">เอกสาร / หลักฐานที่ต้องเพิ่ม</span></div><div class="frame-bd">'+(dH||'<div style="color:#999;">—</div>')+'</div></div>'
    +'<div class="frame" style="border-bottom:none;"><div class="frame-hd fe-hd"><span class="ftag fe-tag">E</span><span style="color:#2a1060;">สถานะการดำเนินงาน</span><span class="sbadge '+sClass(s.status)+'" style="margin-left:auto;">'+sIcon(s.status)+' '+s.status+'</span></div><div class="frame-bd">'+eH+'</div></div>';
};

renderAll();
</script>

</body>
